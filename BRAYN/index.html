<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BRAYN Digger</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-top: #120523;
      --bg-bottom: #04050d;
      --hud-height: 72px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #000;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .game-shell {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(112, 39, 177, 0.36), transparent 38%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      padding:
        calc(env(safe-area-inset-top, 0px) + 10px)
        calc(env(safe-area-inset-right, 0px) + 10px)
        0
        calc(env(safe-area-inset-left, 0px) + 10px);
      pointer-events: none;
    }

    .hud-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      min-width: 74px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(5, 10, 26, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(8px);
    }

    .chip-label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(219, 225, 255, 0.72);
    }

    .chip-value {
      display: block;
      margin-top: 2px;
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
      color: #fff;
    }

    .hint {
      align-self: stretch;
      display: flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(5, 10, 26, 0.64);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(235, 240, 255, 0.9);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    @media (max-width: 520px) {
      .hud {
        justify-content: center;
      }

      .hint {
        font-size: 11px;
      }

      .chip {
        min-width: 68px;
        padding: 6px 9px;
      }

      .chip-value {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <canvas id="game" aria-label="BRAYN Digger"></canvas>
    <section class="hud" aria-live="polite">
      <div class="hud-group">
        <div class="chip">
          <span class="chip-label">Level</span>
          <span class="chip-value" id="levelValue">1</span>
        </div>
        <div class="chip">
          <span class="chip-label">Score</span>
          <span class="chip-value" id="scoreValue">0</span>
        </div>
        <div class="chip">
          <span class="chip-label">Lives</span>
          <span class="chip-value" id="livesValue">3</span>
        </div>
      </div>
      <div class="hint">Swipe or use arrows</div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const context = canvas.getContext("2d");
    context.imageSmoothingEnabled = false;

    const levelValue = document.getElementById("levelValue");
    const scoreValue = document.getElementById("scoreValue");
    const livesValue = document.getElementById("livesValue");

    const TILE_OPTIONS = [32, 28, 24];
    const MIN_COLS = 10;
    const MIN_ROWS = 16;
    const LEVEL_ONE_MOVE_INTERVAL = 128; // 128ms yields a 1.25x move rate versus the prior 160ms level-1 interval.
    const LEVEL_SPEED_SCALE = 0.94;
    const MIN_MOVE_INTERVAL = 76;
    const ENEMY_LAG_RATIO = 1.12;
    const ENEMY_OPTIMAL_CHOICE_PROBABILITY = 0.72;
    const ENEMY_RANDOM_CHOICE_POOL_SIZE = 3;
    const ROCK_DENSITY_DIVISOR = 11;
    const GEM_DENSITY_DIVISOR = 18;
    const PLACEMENT_ATTEMPTS_MULTIPLIER = 40;
    const INTRO_OVERLAY_MESSAGE = "Collect every gem.";
    const PLAYER_SPRITE = [
      "00111100",
      "01111110",
      "11122111",
      "11222211",
      "11133111",
      "01133110",
      "01100110",
      "11000011"
    ];
    const ENEMY_SPRITE = [
      "00111100",
      "01111110",
      "11211211",
      "12222221",
      "11222211",
      "01111110",
      "01100110",
      "11000011"
    ];
    const GEM_SPRITE = [
      "00044000",
      "00444400",
      "04455440",
      "44555544",
      "04555540",
      "00455400",
      "00044000",
      "00000000"
    ];
    const ROCK_SPRITE = [
      "00066000",
      "00666600",
      "06667660",
      "66666666",
      "66766676",
      "06666660",
      "00666600",
      "00066000"
    ];
    const PALETTE = {
      0: null,
      1: "#ffe082",
      2: "#5c1f6f",
      3: "#00d3ff",
      4: "#90caf9",
      5: "#ffffff",
      6: "#8d6e63",
      7: "#bcaaa4"
    };
    const DIRECTIONS = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };

    const state = {
      level: 1,
      score: 0,
      lives: 3,
      layout: null,
      dirt: [],
      rocks: new Set(),
      gems: new Set(),
      player: { x: 1, y: 1, direction: "right", queued: "right" },
      enemies: [],
      lastTime: 0,
      playerAccumulator: 0,
      enemyAccumulator: 0,
      overlayMessage: INTRO_OVERLAY_MESSAGE,
      overlayTime: 1800,
      invulnerableUntil: 0,
      started: false,
      running: true
    };

    function keyFor(x, y) {
      return `${x},${y}`;
    }

    function isInside(x, y) {
      return x >= 0 && y >= 0 && x < state.layout.cols && y < state.layout.rows;
    }

    function isWall(x, y) {
      return x === 0 || y === 0 || x === state.layout.cols - 1 || y === state.layout.rows - 1;
    }

    function getMoveInterval(level) {
      return Math.max(MIN_MOVE_INTERVAL, LEVEL_ONE_MOVE_INTERVAL * Math.pow(LEVEL_SPEED_SCALE, level - 1));
    }

    function getEnemyInterval(level) {
      return getMoveInterval(level) * ENEMY_LAG_RATIO;
    }

    function chooseLayout(width, height) {
      for (const tile of TILE_OPTIONS) {
        const cols = Math.floor(width / tile);
        const rows = Math.floor(height / tile);
        if (cols >= MIN_COLS && rows >= MIN_ROWS) {
          return {
            tile,
            cols,
            rows,
            width: cols * tile,
            height: rows * tile,
            offsetX: Math.floor((width - cols * tile) / 2),
            offsetY: Math.floor((height - rows * tile) / 2)
          };
        }
      }

      const tile = 24;
      const cols = Math.max(MIN_COLS, Math.floor(width / tile));
      const rows = Math.max(MIN_ROWS, Math.floor(height / tile));
      return {
        tile,
        cols,
        rows,
        width: cols * tile,
        height: rows * tile,
        offsetX: Math.floor((width - cols * tile) / 2),
        offsetY: Math.floor((height - rows * tile) / 2)
      };
    }

    function resize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      state.layout = chooseLayout(width, height);
      buildLevel(state.level, true);
    }

    function buildLevel(level, preserveProgress = false) {
      const previous = preserveProgress ? { score: state.score, lives: state.lives } : null;
      const { cols, rows } = state.layout;
      state.dirt = Array.from({ length: rows }, (_, y) =>
        Array.from({ length: cols }, (_, x) => !isWall(x, y))
      );
      state.rocks = new Set();
      state.gems = new Set();
      state.enemies = [];
      state.player = { x: 1, y: 1, direction: null, queued: null };
      state.playerAccumulator = 0;
      state.enemyAccumulator = 0;
      state.invulnerableUntil = performance.now() + 900;
      state.started = false;

      state.dirt[1][1] = false;
      state.dirt[1][2] = false;

      const rockCount = Math.max(14, Math.floor((cols * rows) / ROCK_DENSITY_DIVISOR));
      const gemCount = Math.max(8, Math.floor((cols * rows) / GEM_DENSITY_DIVISOR));
      const enemyCount = Math.min(5, 1 + Math.floor((level - 1) / 2));

      populateSet(state.rocks, rockCount, (x, y) => {
        if (x < 2 && y < 3) return false;
        if (x > cols - 4 && y > rows - 4) return false;
        return !isWall(x, y);
      });
      populateSet(state.gems, gemCount, (x, y) => {
        if (state.rocks.has(keyFor(x, y))) return false;
        if (x < 2 && y < 3) return false;
        return !isWall(x, y);
      });

      for (let index = 0; index < enemyCount; index += 1) {
        const position = findOpenCell(cols - 2 - index, rows - 2);
        state.enemies.push({
          x: position.x,
          y: position.y,
          direction: index % 2 === 0 ? "left" : "up"
        });
      }

      if (previous) {
        state.score = previous.score;
        state.lives = previous.lives;
      }

      syncHud();
    }

    function populateSet(target, amount, validator) {
      const attempts = amount * PLACEMENT_ATTEMPTS_MULTIPLIER;
      let placed = 0;
      for (let index = 0; index < attempts && placed < amount; index += 1) {
        const x = 1 + Math.floor(Math.random() * (state.layout.cols - 2));
        const y = 1 + Math.floor(Math.random() * (state.layout.rows - 2));
        const id = keyFor(x, y);
        if (target.has(id) || !validator(x, y)) continue;
        target.add(id);
        placed += 1;
      }
    }

    function findOpenCell(startX, startY) {
      for (let radius = 0; radius < Math.max(state.layout.cols, state.layout.rows); radius += 1) {
        for (let y = Math.max(1, startY - radius); y <= Math.min(state.layout.rows - 2, startY + radius); y += 1) {
          for (let x = Math.max(1, startX - radius); x <= Math.min(state.layout.cols - 2, startX + radius); x += 1) {
            if (!state.rocks.has(keyFor(x, y)) && !state.gems.has(keyFor(x, y))) {
              return { x, y };
            }
          }
        }
      }
      return { x: 1, y: 1 };
    }

    function syncHud() {
      levelValue.textContent = state.level;
      scoreValue.textContent = state.score;
      livesValue.textContent = state.lives;
    }

    function canMoveTo(x, y) {
      return isInside(x, y) && !isWall(x, y) && !state.rocks.has(keyFor(x, y));
    }

    function stepPlayer() {
      const queuedVector = DIRECTIONS[state.player.queued];
      if (queuedVector) {
        const queuedX = state.player.x + queuedVector.x;
        const queuedY = state.player.y + queuedVector.y;
        if (canMoveTo(queuedX, queuedY)) {
          state.player.direction = state.player.queued;
        }
      }

      const vector = DIRECTIONS[state.player.direction];
      if (!vector) return;
      const nextX = state.player.x + vector.x;
      const nextY = state.player.y + vector.y;

      if (!canMoveTo(nextX, nextY)) return;

      state.player.x = nextX;
      state.player.y = nextY;

      if (state.dirt[nextY]?.[nextX]) {
        state.dirt[nextY][nextX] = false;
        state.score += 5;
      }

      const gemId = keyFor(nextX, nextY);
      if (state.gems.delete(gemId)) {
        state.score += 150;
        state.overlayMessage = "Gem secured!";
        state.overlayTime = 520;
      }

      if (state.enemies.some((enemy) => enemy.x === nextX && enemy.y === nextY)) {
        loseLife();
        return;
      }

      if (state.gems.size === 0) {
        state.level += 1;
        state.overlayMessage = `Level ${state.level}`;
        state.overlayTime = 1200;
        buildLevel(state.level);
      }

      syncHud();
    }

    function stepEnemies() {
      if (!state.started) return;

      for (const enemy of state.enemies) {
        const options = [];
        for (const [direction, vector] of Object.entries(DIRECTIONS)) {
          const nextX = enemy.x + vector.x;
          const nextY = enemy.y + vector.y;
          if (!canMoveTo(nextX, nextY)) continue;
          const distance = Math.abs(state.player.x - nextX) + Math.abs(state.player.y - nextY);
          options.push({ direction, nextX, nextY, distance });
        }

        if (!options.length) continue;

        options.sort((left, right) => left.distance - right.distance);
        const pick = Math.random() < ENEMY_OPTIMAL_CHOICE_PROBABILITY
          ? options[0]
          : options[Math.floor(Math.random() * Math.min(ENEMY_RANDOM_CHOICE_POOL_SIZE, options.length))];
        enemy.x = pick.nextX;
        enemy.y = pick.nextY;
        enemy.direction = pick.direction;

        if (enemy.x === state.player.x && enemy.y === state.player.y) {
          loseLife();
          return;
        }
      }
    }

    function loseLife() {
      const now = performance.now();
      if (now < state.invulnerableUntil) return;

      state.lives -= 1;
      syncHud();

      if (state.lives <= 0) {
        state.level = 1;
        state.score = 0;
        state.lives = 3;
        state.overlayMessage = "Restarting run";
        state.overlayTime = 1500;
        buildLevel(state.level);
        return;
      }

      state.overlayMessage = "Careful!";
      state.overlayTime = 900;
      state.player = { x: 1, y: 1, direction: null, queued: null };
      state.started = false;
      state.invulnerableUntil = now + 1300;
    }

    function drawTile(x, y, color) {
      const { tile, offsetX, offsetY } = state.layout;
      context.fillStyle = color;
      context.fillRect(offsetX + x * tile, offsetY + y * tile, tile, tile);
    }

    function drawSprite(sprite, x, y, fallbackColor, alpha = 1) {
      const { tile, offsetX, offsetY } = state.layout;
      const px = tile / 8;
      const originX = offsetX + x * tile;
      const originY = offsetY + y * tile;

      context.save();
      context.globalAlpha = alpha;
      context.fillStyle = fallbackColor;
      context.fillRect(originX, originY, tile, tile);
      context.restore();

      for (let row = 0; row < sprite.length; row += 1) {
        for (let column = 0; column < sprite[row].length; column += 1) {
          const pixel = sprite[row][column];
          const color = PALETTE[pixel];
          if (!color) continue;
          context.fillStyle = color;
          context.fillRect(originX + column * px, originY + row * px, Math.ceil(px), Math.ceil(px));
        }
      }
    }

    function render() {
      const width = canvas.width;
      const height = canvas.height;

      context.clearRect(0, 0, width, height);

      const background = context.createLinearGradient(0, 0, 0, height);
      background.addColorStop(0, "#1b0930");
      background.addColorStop(0.22, "#2d1652");
      background.addColorStop(0.221, "#36205f");
      background.addColorStop(1, "#09080f");
      context.fillStyle = background;
      context.fillRect(0, 0, width, height);

      const strataHeight = Math.max(24, Math.floor(state.layout.tile * 1.4));
      for (let y = 0; y < height; y += strataHeight) {
        context.fillStyle = y < state.layout.offsetY ? "rgba(64, 31, 96, 0.24)" : "rgba(26, 12, 44, 0.3)";
        context.fillRect(0, y, width, Math.max(3, strataHeight - 4));
      }

      for (let row = 0; row < state.layout.rows; row += 1) {
        for (let column = 0; column < state.layout.cols; column += 1) {
          const dirtColor = isWall(column, row) ? "#2b1e18" : state.dirt[row][column] ? "#5f3b22" : "#170f1f";
          drawTile(column, row, dirtColor);

          if (state.dirt[row][column]) {
            context.fillStyle = "rgba(231, 177, 109, 0.18)";
            context.fillRect(
              state.layout.offsetX + column * state.layout.tile + Math.floor(state.layout.tile * 0.18),
              state.layout.offsetY + row * state.layout.tile + Math.floor(state.layout.tile * 0.18),
              Math.floor(state.layout.tile * 0.18),
              Math.floor(state.layout.tile * 0.18)
            );
          }
        }
      }

      for (const rockId of state.rocks) {
        const [x, y] = rockId.split(",").map(Number);
        drawSprite(ROCK_SPRITE, x, y, "#49352f");
      }

      for (const gemId of state.gems) {
        const [x, y] = gemId.split(",").map(Number);
        drawSprite(GEM_SPRITE, x, y, "#20153a");
      }

      const playerAlpha = performance.now() < state.invulnerableUntil && Math.floor(performance.now() / 100) % 2 === 0 ? 0.45 : 1;
      drawSprite(PLAYER_SPRITE, state.player.x, state.player.y, "#26153a", playerAlpha);

      for (const enemy of state.enemies) {
        drawSprite(ENEMY_SPRITE, enemy.x, enemy.y, "#2d1626");
      }

      if (state.overlayTime > 0) {
        context.fillStyle = "rgba(0, 0, 0, 0.35)";
        context.fillRect(0, Math.floor(height * 0.46), width, 48);
        context.fillStyle = "#fdf7ff";
        context.textAlign = "center";
        context.textBaseline = "middle";
        context.font = "700 22px 'Trebuchet MS', sans-serif";
        context.fillText(state.overlayMessage, width / 2, Math.floor(height * 0.46) + 24);
      }
    }

    function tick(timestamp) {
      if (!state.lastTime) state.lastTime = timestamp;
      const delta = timestamp - state.lastTime;
      state.lastTime = timestamp;
      state.playerAccumulator += delta;
      state.enemyAccumulator += delta;
      state.overlayTime = Math.max(0, state.overlayTime - delta);

      while (state.playerAccumulator >= getMoveInterval(state.level)) {
        stepPlayer();
        state.playerAccumulator -= getMoveInterval(state.level);
      }

      while (state.enemyAccumulator >= getEnemyInterval(state.level)) {
        stepEnemies();
        state.enemyAccumulator -= getEnemyInterval(state.level);
      }

      render();
      requestAnimationFrame(tick);
    }

    function queueDirection(direction) {
      if (DIRECTIONS[direction]) {
        state.started = true;
        state.player.queued = direction;
        if (!state.overlayTime || state.overlayMessage === INTRO_OVERLAY_MESSAGE) {
          state.overlayMessage = "";
          state.overlayTime = 0;
        }
      }
    }

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowUp" || event.key === "w") queueDirection("up");
      if (event.key === "ArrowDown" || event.key === "s") queueDirection("down");
      if (event.key === "ArrowLeft" || event.key === "a") queueDirection("left");
      if (event.key === "ArrowRight" || event.key === "d") queueDirection("right");
    });

    let touchStart = null;

    window.addEventListener("touchstart", (event) => {
      const point = event.touches[0];
      touchStart = { x: point.clientX, y: point.clientY };
    }, { passive: true });

    window.addEventListener("touchmove", (event) => {
      if (!touchStart) return;
      const point = event.touches[0];
      const dx = point.clientX - touchStart.x;
      const dy = point.clientY - touchStart.y;
      if (Math.abs(dx) < 18 && Math.abs(dy) < 18) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        queueDirection(dx > 0 ? "right" : "left");
      } else {
        queueDirection(dy > 0 ? "down" : "up");
      }
      touchStart = { x: point.clientX, y: point.clientY };
    }, { passive: true });

    window.addEventListener("touchend", () => {
      touchStart = null;
    }, { passive: true });

    window.addEventListener("resize", resize);

    resize();
    syncHud();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
