<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BRAYN Wheel of Fortune</title>
  <style>
    :root {
      --bg: #03040d;
      --pink: #ff1296;
      --pink-2: #ff5ec1;
      --lime: #d5f20e;
      --cyan: #00eaff;
      --blue-a: #1f1fc1;
      --blue-b: #215bff;
      --ring: #e4007b;
      --text: #ffffff;
      --shadow: rgba(0, 0, 0, 0.35);
      --wheel-size: min(88vw, 760px);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #000;
      font-family: Inter, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      color: var(--text);
      background:
        radial-gradient(circle at 50% 20%, rgba(35,44,180,.45), transparent 40%),
        linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.45)),
        #000;
    }

    .app {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.42)),
        url("assets/bg/bg.png") center center / cover no-repeat;
      isolation: isolate;
    }

    .stars,
    .stars::before,
    .stars::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-repeat: repeat;
      animation: twinkle 7s linear infinite;
      opacity: .55;
    }

    .stars {
      background-image:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,.95) 0 1px, transparent 2px),
        radial-gradient(circle at 82% 14%, rgba(255,255,255,.8) 0 1.2px, transparent 2.2px),
        radial-gradient(circle at 24% 42%, rgba(255,255,255,.9) 0 1.4px, transparent 2.4px),
        radial-gradient(circle at 68% 34%, rgba(255,255,255,.7) 0 1px, transparent 2px),
        radial-gradient(circle at 50% 72%, rgba(255,255,255,.95) 0 1.6px, transparent 2.6px),
        radial-gradient(circle at 88% 62%, rgba(255,255,255,.78) 0 1.2px, transparent 2.2px);
      filter: blur(.1px);
    }

    .stars::before {
      background-image:
        radial-gradient(circle at 16% 28%, rgba(255,255,255,.55) 0 1px, transparent 2px),
        radial-gradient(circle at 74% 24%, rgba(255,255,255,.45) 0 1.2px, transparent 2.2px),
        radial-gradient(circle at 30% 57%, rgba(255,255,255,.6) 0 1.2px, transparent 2.2px),
        radial-gradient(circle at 57% 44%, rgba(255,255,255,.48) 0 1px, transparent 2px),
        radial-gradient(circle at 84% 82%, rgba(255,255,255,.5) 0 1.2px, transparent 2.2px);
      animation-duration: 10s;
      opacity: .38;
      transform: scale(1.15);
    }

    .stars::after {
      background-image:
        radial-gradient(circle at 7% 67%, rgba(255,255,255,.4) 0 2px, transparent 4px),
        radial-gradient(circle at 46% 29%, rgba(255,255,255,.32) 0 2.4px, transparent 4.6px),
        radial-gradient(circle at 91% 48%, rgba(255,255,255,.35) 0 2px, transparent 4px);
      animation-duration: 12s;
      opacity: .22;
    }

    @keyframes twinkle {
      0%, 100% { opacity: .42; transform: translateY(0); }
      50% { opacity: .62; transform: translateY(-3px); }
    }

    .topbar {
      position: relative;
      z-index: 3;
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: max(14px, env(safe-area-inset-top)) 16px 0;
    }

    .pill {
      min-width: 120px;
      height: 52px;
      padding: 0 16px;
      border-radius: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(7, 10, 31, .76);
      border: 1px solid rgba(255, 255, 255, .12);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.04),
        0 0 18px rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }

    .pill::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,.08), transparent 40%);
    }

    .pill img {
      width: 26px;
      height: 26px;
      object-fit: contain;
      flex: 0 0 26px;
      image-rendering: auto;
      filter: drop-shadow(0 0 8px currentColor);
    }

    .pill[data-type="neuron"] { color: var(--pink); }
    .pill[data-type="axon"] { color: var(--lime); }
    .pill[data-type="min"] { color: var(--cyan); }

    .pill .count {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .02em;
    }

    .pill.bump {
      animation: pillBump .55s ease;
    }

    @keyframes pillBump {
      0% { transform: scale(1); }
      35% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .stage {
      position: relative;
      z-index: 2;
      display: grid;
      place-items: center;
      min-height: calc(100vh - 72px);
      padding: 24px 16px 40px;
    }

    .wheel-wrap {
      position: relative;
      width: var(--wheel-size);
      height: var(--wheel-size);
      filter: drop-shadow(0 22px 40px rgba(0,0,0,.45));
    }

    .pointer {
      position: absolute;
      top: 3.6%;
      left: 50%;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      z-index: 6;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-top: 0;
      border-bottom: 52px solid var(--lime);
      filter: drop-shadow(0 0 12px rgba(213,242,14,.75));
    }

    .rim {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, transparent 64%, rgba(0,0,0,.18) 65%, rgba(0,0,0,.18) 66%, transparent 67%),
        radial-gradient(circle at 50% 50%, transparent 0 76%, var(--ring) 76% 83%, transparent 83%);
      z-index: 1;
      pointer-events: none;
      filter: drop-shadow(0 0 16px rgba(255,18,150,.45));
    }

    .bulbs {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .bulb {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 16px;
      height: 16px;
      margin: -8px;
      border-radius: 50%;
      background: rgba(255, 210, 238, .95);
      box-shadow: 0 0 10px rgba(255,255,255,.65), 0 0 16px rgba(255,18,150,.42);
      opacity: .42;
      transform:
        rotate(var(--rot))
        translateY(calc(var(--wheel-size) * -0.392))
        rotate(calc(var(--rot) * -1));
    }

    .bulb.on {
      opacity: 1;
      background: #fff;
      box-shadow: 0 0 14px rgba(255,255,255,.88), 0 0 26px rgba(255,18,150,.62);
    }

    .wheel {
      position: absolute;
      inset: 8.5%;
      border-radius: 50%;
      overflow: hidden;
      z-index: 2;
      transform: rotate(0deg);
      background:
        conic-gradient(
          from -90deg,
          var(--blue-b) 0deg 45deg,
          var(--blue-a) 45deg 90deg,
          var(--blue-b) 90deg 135deg,
          var(--blue-a) 135deg 180deg,
          var(--blue-b) 180deg 225deg,
          var(--blue-a) 225deg 270deg,
          var(--blue-b) 270deg 315deg,
          var(--blue-a) 315deg 360deg
        );
      border: 2px solid rgba(255,255,255,.18);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.08),
        0 0 18px rgba(0,0,0,.26);
      will-change: transform;
    }

    .wheel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 0 28%, rgba(255,255,255,.05) 28.2% 28.6%, transparent 28.8%),
        repeating-conic-gradient(from -90deg, rgba(255,255,255,.26) 0deg .7deg, transparent .7deg 45deg);
      pointer-events: none;
    }

    .slot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(68px, 15vw, 108px);
      transform:
        translate(-50%, -50%)
        rotate(var(--rot))
        translateY(calc(var(--radius) * -1))
        rotate(calc(var(--rot) * -1));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: clamp(4px, 1vw, 8px);
      padding: clamp(2px, .8vw, 6px) 0;
      text-align: center;
      pointer-events: none;
      user-select: none;
    }

    .slot img {
      width: clamp(28px, 6vw, 48px);
      height: auto;
      aspect-ratio: 1 / 1;
      max-width: 100%;
      object-fit: contain;
      flex: 0 0 auto;
      filter: drop-shadow(0 0 8px rgba(255,255,255,.25));
      image-rendering: -webkit-optimize-contrast;
      transform: translateZ(0);
    }

    .slot .value {
      min-width: 100%;
      padding-inline: 2px;
      font-size: clamp(16px, 2.9vw, 24px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: .02em;
      white-space: nowrap;
      text-shadow: 0 0 12px currentColor;
    }

    .slot.neuron .value { color: var(--pink); }
    .slot.axon .value { color: var(--lime); }
    .slot.min .value { color: var(--cyan); }

    .center-btn {
      position: absolute;
      inset: 36% 36%;
      z-index: 7;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: grid;
      place-items: center;
      gap: 2px;
      color: #000;
      background:
        radial-gradient(circle at 35% 28%, rgba(255,255,255,.22), transparent 28%),
        radial-gradient(circle at center, #a4b322, #7f920d 65%, #647607 100%);
      box-shadow:
        inset 0 8px 18px rgba(255,255,255,.15),
        inset 0 -10px 18px rgba(0,0,0,.18),
        0 0 0 10px rgba(0, 28, 26, .65),
        0 18px 30px rgba(0,0,0,.35);
      transition: transform .18s ease, filter .18s ease, opacity .18s ease;
    }

    .center-btn:hover { transform: scale(1.02); }
    .center-btn:active { transform: scale(.98); }
    .center-btn:disabled {
      cursor: not-allowed;
      opacity: .9;
    }

    .go-main {
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: .04em;
    }

    .go-cost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 900;
      line-height: 1;
    }

    .go-cost img {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }

    .message {
      position: absolute;
      left: 50%;
      bottom: 6%;
      transform: translateX(-50%);
      z-index: 9;
      padding: 10px 16px;
      border-radius: 14px;
      background: rgba(7,10,31,.82);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(8px);
      font-size: 14px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity .24s ease, transform .24s ease;
      white-space: nowrap;
    }

    .message.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-8px);
    }

    .reward-burst {
      --burst-color: rgba(255, 255, 255, .72);
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
    }

    .reward-burst::before,
    .reward-burst::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      transform: scale(.68);
    }

    .reward-burst::before {
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.92) 0 10%, var(--burst-color) 22%, transparent 58%);
      filter: blur(2px);
    }

    .reward-burst::after {
      inset: 12%;
      background:
        radial-gradient(circle at 50% 40%, rgba(255,255,255,.55) 0 18%, transparent 54%),
        radial-gradient(circle at center, var(--burst-color) 0 28%, transparent 62%);
      mix-blend-mode: screen;
    }

    .reward-burst.active::before {
      animation: rewardBurstPulse .46s ease-out forwards;
    }

    .reward-burst.active::after {
      animation: rewardBurstBlink .34s ease-out forwards;
    }

    @keyframes rewardBurstPulse {
      0% { opacity: 0; transform: scale(.62); }
      22% { opacity: .95; }
      100% { opacity: 0; transform: scale(1.14); }
    }

    @keyframes rewardBurstBlink {
      0% { opacity: 0; transform: scale(.4); }
      26% { opacity: .82; }
      100% { opacity: 0; transform: scale(1.02); }
    }

    .flying-icon {
      position: fixed;
      width: 22px;
      height: 22px;
      object-fit: contain;
      pointer-events: none;
      z-index: 20;
      will-change: transform, opacity;
      filter: drop-shadow(0 0 10px rgba(255,255,255,.25));
    }

    canvas#fx {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 8;
    }

    .ray-pop {
      position: fixed;
      left: 50%;
      top: 50%;
      width: clamp(140px, 21vw, 220px);
      opacity: 0;
      pointer-events: none;
      z-index: 14;
      transform: translate3d(-50%, -50%, 0) scale(.82);
      transform-origin: center bottom;
      will-change: transform, opacity;
      transition: opacity .18s ease-out;
    }

    .ray-pop.active {
      opacity: 1;
      animation: rayCelebrate 1.5s cubic-bezier(.22, .9, .24, 1) forwards;
    }

    .ray-pop canvas {
      display: block;
      width: 100%;
      height: auto;
      background: transparent;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,.34));
    }

    .ray-pop-shadow {
      position: absolute;
      left: 50%;
      bottom: 6px;
      width: 42%;
      height: 12px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(0,0,0,.42) 0%, rgba(0,0,0,0) 72%);
      transform: translateX(-50%) scale(1, 1);
      opacity: .22;
    }

    .ray-pop.active .ray-pop-shadow {
      animation: rayCelebrateShadow 1.5s ease-out forwards;
    }

    @keyframes rayCelebrate {
      0% {
        transform: translate3d(-50%, calc(-50% + 20px), 0) scale(.72);
      }
      14% {
        transform: translate3d(-50%, calc(-50% + 12px), 0) scale(.94);
      }
      42% {
        transform: translate3d(-50%, calc(-50% - 36px), 0) scale(1.12);
      }
      58% {
        transform: translate3d(-50%, calc(-50% - 10px), 0) scale(1.04);
      }
      82% {
        transform: translate3d(-50%, calc(-50% - 16px), 0) scale(1.02);
      }
      100% {
        transform: translate3d(-50%, calc(-50% - 4px), 0) scale(.88);
      }
    }

    @keyframes rayCelebrateShadow {
      0% {
        opacity: .26;
        transform: translateX(-50%) scale(1.12, .94);
      }
      42% {
        opacity: .12;
        transform: translateX(-50%) scale(.72, .66);
      }
      100% {
        opacity: .06;
        transform: translateX(-50%) scale(.92, .82);
      }
    }

    @media (max-width: 700px) {
      .topbar {
        gap: 8px;
        padding-inline: 10px;
      }
      .pill {
        min-width: 100px;
        height: 48px;
        padding: 0 12px;
      }
      .pill img { width: 22px; height: 22px; flex-basis: 22px; }
      .pill .count { font-size: 16px; }
      .slot { width: clamp(62px, 17vw, 88px); gap: 4px; }
      .slot img { width: clamp(26px, 5.5vw, 38px); }
      .slot .value { font-size: clamp(15px, 4vw, 20px); }
      .pointer {
        border-left-width: 16px;
        border-right-width: 16px;
        border-bottom-width: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="stars"></div>

    <header class="topbar">
      <div class="pill" data-type="neuron" id="pill-neuron">
        <img src="assets/icons/neuron.png" alt="Neuron" />
        <span class="count" id="count-neuron">1000</span>
      </div>
      <div class="pill" data-type="axon" id="pill-axon">
        <img src="assets/icons/axon.png" alt="Axon" />
        <span class="count" id="count-axon">1245</span>
      </div>
      <div class="pill" data-type="min" id="pill-min">
        <img src="assets/icons/min.png" alt="Minutes" />
        <span class="count" id="count-min">129</span>
      </div>
    </header>

    <main class="stage">
      <div class="wheel-wrap">
        <div class="pointer"></div>
        <div class="reward-burst" id="rewardBurst" aria-hidden="true"></div>
        <div class="rim"></div>
        <div class="bulbs" id="bulbs"></div>
        <div class="wheel" id="wheel"></div>

        <button class="center-btn" id="spinBtn" aria-label="Spin the wheel">
          <div class="go-main">GO</div>
          <div class="go-cost">
            <span>300</span>
            <img src="assets/icons/neuron.png" alt="Neuron cost" />
          </div>
        </button>

        <div class="message" id="message"></div>
      </div>
    </main>

    <canvas id="fx"></canvas>
    <div class="ray-pop" id="rayPop" aria-hidden="true">
      <div class="ray-pop-shadow" id="rayPopShadow"></div>
      <canvas id="rayCanvas" width="60" height="96" aria-label="Celebrating Ray Pixel character"></canvas>
    </div>
  </div>

  <script>
    const CONFIG = {
      assets: {
        neuron: "assets/icons/neuron.png",
        axon: "assets/icons/axon.png",
        min: "assets/icons/min.png"
      },
      spinCost: 300,
      defaultBalances: {
        neuron: 1000,
        axon: 1245,
        min: 129
      },
      segments: [
        { type: "neuron", value: 234 },
        { type: "axon", value: 20 },
        { type: "neuron", value: 5 },
        { type: "axon", value: 300 },
        { type: "min", value: 35 },
        { type: "neuron", value: 5 },
        { type: "axon", value: 2 },
        { type: "min", value: 2 }
      ],
      colors: {
        neuron: "#ff1296",
        axon: "#d5f20e",
        min: "#00eaff"
      }
    };

    const SLOT_LAYOUT = {
      fallbackDepthRatio: 0.18,
      minSafeInset: 18,
      safeInsetRatio: 0.08,
      minRadiusRatio: 0.285
    };

    const FIREWORKS_CONFIG = {
      minFadeRange: 0.001,
      trailAlphaMultiplier: 0.28,
      minTrailWidth: 0.5,
      trailWidthMultiplier: 0.52,
      twinkleFrequency: 0.45,
      minParticleSize: 0.65,
      layerVelocityOffset: 0.15,
      cometMinUpwardBias: 1,
      cometUpwardBiasRange: 1.4
    };

    const FIREWORK_PALETTE = {
      subtleSpread: 18,
      vividSpread: 30,
      whiteMix: 0.3,
      warmMix: 0.22
    };

    const FIREWORK_LAYERS = [
      { name: "outer", count: 30, speedMin: 3.8, speedMax: 6.7, jitter: 0.12, sizeMin: 2.1, sizeMax: 4.8, gravityMin: 0.048, gravityMax: 0.082, lifeMin: 54, lifeMax: 84, dragMin: 0.964, dragMax: 0.976, trailMax: 4, glow: 20, fadeStart: 0.35, shrinkMin: 0.976, shrinkMax: 0.985, twinkle: 0.2 },
      { name: "mid", count: 18, speedMin: 2.2, speedMax: 4.3, jitter: 0.22, sizeMin: 1.6, sizeMax: 3.2, gravityMin: 0.04, gravityMax: 0.07, lifeMin: 46, lifeMax: 72, dragMin: 0.972, dragMax: 0.984, trailMax: 3, glow: 15, fadeStart: 0.42, shrinkMin: 0.982, shrinkMax: 0.989, twinkle: 0.14 },
      { name: "inner", count: 12, speedMin: 0.9, speedMax: 2.1, jitter: 0.34, sizeMin: 1.2, sizeMax: 2.4, gravityMin: 0.028, gravityMax: 0.052, lifeMin: 68, lifeMax: 104, dragMin: 0.984, dragMax: 0.992, trailMax: 2, glow: 10, fadeStart: 0.56, shrinkMin: 0.988, shrinkMax: 0.994, twinkle: 0.08 }
    ];

    const wheel = document.getElementById("wheel");
    const bulbs = document.getElementById("bulbs");
    const spinBtn = document.getElementById("spinBtn");
    const msg = document.getElementById("message");
    const rewardBurst = document.getElementById("rewardBurst");
    const fxCanvas = document.getElementById("fx");
    const fxCtx = fxCanvas.getContext("2d");
    const rayPop = document.getElementById("rayPop");
    const rayPopShadow = document.getElementById("rayPopShadow");
    const rayCanvas = document.getElementById("rayCanvas");
    const rayCtx = rayCanvas.getContext("2d");
    const isCoarsePointer = typeof window.matchMedia === "function" && window.matchMedia("(pointer: coarse)").matches;
    const particlePool = [];
    const colorChannelCache = new Map();
    const RAY_SOURCE_PATH = "../ray_pixel_interactive.html";
    const rayState = {
      jumpPose: null,
      loadPromise: null,
      token: 0
    };

    let balances = { ...CONFIG.defaultBalances };
    let currentRotation = 0;
    let spinning = false;
    let bulbTimer = null;
    let particles = [];
    rayCtx.imageSmoothingEnabled = false;

    function resizeCanvas() {
      const pixelRatio = Math.min(window.devicePixelRatio || 1, isCoarsePointer ? 1.25 : 1.5);
      fxCanvas.width = innerWidth * pixelRatio;
      fxCanvas.height = innerHeight * pixelRatio;
      fxCanvas.style.width = innerWidth + "px";
      fxCanvas.style.height = innerHeight + "px";
      fxCtx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
      updateSlotRadius();
    }

    function updateSlotRadius() {
      const size = wheel.clientWidth;
      const sampleSlot = wheel.querySelector(".slot");
      if (!size || !sampleSlot) return;

      const slotDepth = sampleSlot.getBoundingClientRect().height || size * SLOT_LAYOUT.fallbackDepthRatio;
      const safeInset = Math.max(SLOT_LAYOUT.minSafeInset, size * SLOT_LAYOUT.safeInsetRatio);
      const radius = Math.max(SLOT_LAYOUT.minRadiusRatio * size, size / 2 - safeInset - slotDepth / 2);
      wheel.querySelectorAll(".slot").forEach(slot => {
        slot.style.setProperty("--radius", radius + "px");
      });
    }

    function renderWheel() {
      wheel.innerHTML = "";
      const segmentAngle = 360 / CONFIG.segments.length;

      CONFIG.segments.forEach((segment, index) => {
        const slot = document.createElement("div");
        slot.className = `slot ${segment.type}`;
        slot.style.setProperty("--rot", `${index * segmentAngle + segmentAngle / 2}deg`);

        const img = document.createElement("img");
        img.src = CONFIG.assets[segment.type];
        img.alt = segment.type;

        const value = document.createElement("div");
        value.className = "value";
        value.textContent = segment.value;

        slot.appendChild(img);
        slot.appendChild(value);
        wheel.appendChild(slot);
      });

      updateSlotRadius();
    }

    function renderBulbs() {
      bulbs.innerHTML = "";
      const count = 24;
      for (let i = 0; i < count; i++) {
        const bulb = document.createElement("div");
        bulb.className = "bulb";
        bulb.style.setProperty("--rot", `${(360 / count) * i}deg`);
        bulbs.appendChild(bulb);
      }
    }

    function startBulbLoop(speed = 220) {
      clearInterval(bulbTimer);
      const bulbNodes = [...bulbs.querySelectorAll(".bulb")];
      let step = 0;
      bulbTimer = setInterval(() => {
        bulbNodes.forEach((b, i) => {
          b.classList.toggle("on", (i + step) % 2 === 0);
        });
        step++;
      }, speed);
    }

    function setCount(type, value) {
      document.getElementById(`count-${type}`).textContent = Math.max(0, Math.round(value));
    }

    function renderBalances() {
      Object.keys(balances).forEach(type => setCount(type, balances[type]));
    }

    function tweenBalance(type, from, to, duration = 700) {
      const start = performance.now();
      function frame(now) {
        const t = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - t, 3);
        const val = from + (to - from) * eased;
        setCount(type, val);
        if (t < 1) requestAnimationFrame(frame);
        else setCount(type, to);
      }
      requestAnimationFrame(frame);
    }

    function pulsePill(type) {
      const pill = document.getElementById(`pill-${type}`);
      pill.classList.remove("bump");
      void pill.offsetWidth;
      pill.classList.add("bump");
    }

    function showMessage(text) {
      msg.textContent = text;
      msg.classList.add("show");
      clearTimeout(showMessage._t);
      showMessage._t = setTimeout(() => msg.classList.remove("show"), 1500);
    }

    function easeOutQuint(t) {
      return 1 - Math.pow(1 - t, 5);
    }

    function spinTo(index) {
      spinning = true;
      spinBtn.disabled = true;
      startBulbLoop(90);

      const segmentAngle = 360 / CONFIG.segments.length;
      const fullTurns = 6 + Math.floor(Math.random() * 2);
      const finalRotation = currentRotation + fullTurns * 360 - (index * segmentAngle + segmentAngle / 2);

      const startRotation = currentRotation;
      const duration = 4600 + Math.random() * 600;
      const startTime = performance.now();

      function animate(now) {
        const t = Math.min(1, (now - startTime) / duration);
        const eased = easeOutQuint(t);
        const rot = startRotation + (finalRotation - startRotation) * eased;
        wheel.style.transform = `rotate(${rot}deg)`;

        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          currentRotation = finalRotation % 360;
          spinning = false;
          spinBtn.disabled = false;
          startBulbLoop(220);
          onWin(index);
        }
      }

      requestAnimationFrame(animate);
    }

    function getHeaderTarget(type) {
      const pill = document.getElementById(`pill-${type}`);
      const rect = pill.getBoundingClientRect();
      return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
    }

    function getWheelCenter() {
      const rect = wheel.getBoundingClientRect();
      return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
    }

    function flyRewardIcons(type, amount) {
      const target = getHeaderTarget(type);
      const start = getWheelCenter();
      const count = Math.min(8, Math.max(4, Math.ceil(amount / 50)));

      for (let i = 0; i < count; i++) {
        const img = document.createElement("img");
        img.className = "flying-icon";
        img.src = CONFIG.assets[type];
        img.alt = type;
        document.body.appendChild(img);

        const startX = start.x - 11 + (Math.random() * 20 - 10);
        const startY = start.y - 11 + (Math.random() * 20 - 10);
        const ctrlX = (startX + target.x) / 2 + (Math.random() * 80 - 40);
        const ctrlY = Math.min(startY, target.y) - 120 - Math.random() * 50;

        const delay = i * 80;
        const dur = 760;

        img.style.left = startX + "px";
        img.style.top = startY + "px";

        setTimeout(() => {
          const t0 = performance.now();
          function anim(now) {
            const p = Math.min(1, (now - t0) / dur);
            const e = 1 - Math.pow(1 - p, 3);

            const x = Math.pow(1 - e, 2) * startX + 2 * (1 - e) * e * ctrlX + Math.pow(e, 2) * target.x;
            const y = Math.pow(1 - e, 2) * startY + 2 * (1 - e) * e * ctrlY + Math.pow(e, 2) * target.y;
            const s = 1 - e * 0.45;

            img.style.transform = `translate(${x - startX}px, ${y - startY}px) scale(${s})`;
            img.style.opacity = String(1 - e * 0.08);

            if (p < 1) requestAnimationFrame(anim);
            else img.remove();
          }
          requestAnimationFrame(anim);
        }, delay);
      }
    }

    function mixRgb(a, b, amount = 0.5) {
      const interpolateChannel = (x, y) => Math.round(x + (y - x) * amount);
      return {
        r: interpolateChannel(a.r, b.r),
        g: interpolateChannel(a.g, b.g),
        b: interpolateChannel(a.b, b.b)
      };
    }

    function rgbToCss({ r, g, b }) {
      return `rgb(${r}, ${g}, ${b})`;
    }

    function getColorChannels(color) {
      if (colorChannelCache.has(color)) return colorChannelCache.get(color);

      let channels;
      if (color.startsWith("#")) {
        channels = hexToRgb(color);
      } else {
        const match = color.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/i);
        channels = match
          ? { r: Number(match[1]), g: Number(match[2]), b: Number(match[3]) }
          : { r: 255, g: 255, b: 255 };
      }

      colorChannelCache.set(color, channels);
      return channels;
    }

    function rgbaFromChannels(channels, alpha) {
      return `rgba(${channels.r}, ${channels.g}, ${channels.b}, ${alpha})`;
    }

    function pickRandomItem(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function createFireworkPalette(base) {
      const rgb = hexToRgb(base);
      return [
        varyColor(base, FIREWORK_PALETTE.subtleSpread),
        varyColor(base, FIREWORK_PALETTE.vividSpread),
        rgbToCss(mixRgb(rgb, { r: 255, g: 255, b: 255 }, FIREWORK_PALETTE.whiteMix)),
        rgbToCss(mixRgb(rgb, { r: 255, g: 216, b: 124 }, FIREWORK_PALETTE.warmMix))
      ];
    }

    function getParticleLimit() {
      return isCoarsePointer || innerWidth < 700 ? 180 : 320;
    }

    function recycleParticleAt(index) {
      const particle = particles[index];
      particle.trail.length = 0;
      particlePool.push(particle);

      const last = particles.pop();
      if (index < particles.length) {
        particles[index] = last;
      }
    }

    function addParticle(config) {
      if (particles.length >= getParticleLimit()) return false;

      const particle = particlePool.pop() || { trail: [] };
      particle.trail.length = 0;
      Object.assign(particle, config, {
        maxLife: config.life,
        fadeRange: Math.max(FIREWORKS_CONFIG.minFadeRange, 1 - (config.fadeStart ?? 0.42)),
        trailMax: config.trailMax ?? 0,
        glow: config.glow ?? 14,
        shrink: config.shrink ?? 0.988,
        fadeStart: config.fadeStart ?? 0.42,
        twinkle: config.twinkle ?? Math.random() * 0.18,
        phase: config.phase ?? Math.random() * Math.PI * 2,
        drift: config.drift ?? (Math.random() - 0.5) * 0.02,
        channels: getColorChannels(config.color)
      });

      particles.push(particle);
      return true;
    }

    function spawnFireworks(type) {
      const rect = wheel.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const base = CONFIG.colors[type];
      const palette = createFireworkPalette(base);
      const particleLimit = getParticleLimit();
      const available = particleLimit - particles.length;
      if (available < 24) return;

      const intensity = (isCoarsePointer || innerWidth < 700 ? 0.58 : 0.8) * Math.min(1, available / particleLimit + 0.2);
      const burstCount = Math.max(2, Math.min(isCoarsePointer || innerWidth < 700 ? 3 : 4, Math.floor(available / 36)));

      for (let burst = 0; burst < burstCount; burst++) {
        const angleOffset = Math.random() * Math.PI * 2;
        const orbit = 58 + Math.random() * 126;
        const bx = cx + Math.cos(angleOffset) * orbit;
        const by = cy + Math.sin(angleOffset) * orbit;
        const twist = Math.random() * Math.PI * 2;

        FIREWORK_LAYERS.forEach((layer, layerIndex) => {
          const particleCount = Math.max(layer.name === "inner" ? 4 : 6, Math.round(layer.count * intensity));
          for (let i = 0; i < particleCount; i++) {
            const a = twist + (Math.PI * 2 * i) / particleCount + (Math.random() - 0.5) * layer.jitter;
            const speed = layer.speedMin + Math.random() * (layer.speedMax - layer.speedMin);
            if (!addParticle({
              x: bx,
              y: by,
              vx: Math.cos(a) * speed,
              vy: Math.sin(a) * speed - layerIndex * FIREWORKS_CONFIG.layerVelocityOffset,
              g: layer.gravityMin + Math.random() * (layer.gravityMax - layer.gravityMin),
              life: layer.lifeMin + Math.random() * (layer.lifeMax - layer.lifeMin),
              size: layer.sizeMin + Math.random() * (layer.sizeMax - layer.sizeMin),
              color: pickRandomItem(palette),
              alpha: 1,
              drag: layer.dragMin + Math.random() * (layer.dragMax - layer.dragMin),
              trailMax: layer.trailMax,
              glow: layer.glow,
              fadeStart: layer.fadeStart,
              shrink: layer.shrinkMin + Math.random() * (layer.shrinkMax - layer.shrinkMin),
              twinkle: layer.twinkle,
              drift: (Math.random() - 0.5) * 0.03
            })) return;
          }
        });

        const cometCount = Math.max(2, Math.round((isCoarsePointer || innerWidth < 700 ? 4 : 6) * intensity));
        for (let comet = 0; comet < cometCount; comet++) {
          const a = twist + (Math.random() - 0.5) * 1.1;
          const speed = 4.4 + Math.random() * 2.4;
          if (!addParticle({
            x: bx,
            y: by,
            vx: Math.cos(a) * speed,
            vy: Math.sin(a) * speed - (FIREWORKS_CONFIG.cometMinUpwardBias + Math.random() * FIREWORKS_CONFIG.cometUpwardBiasRange),
            g: 0.052 + Math.random() * 0.02,
            life: 58 + Math.random() * 24,
            size: 1.5 + Math.random() * 1.8,
            color: pickRandomItem(palette),
            alpha: 1,
            drag: 0.978 + Math.random() * 0.01,
            trailMax: 5,
            glow: 22,
            fadeStart: 0.32,
            shrink: 0.982,
            twinkle: 0.22,
            drift: (Math.random() - 0.5) * 0.018
          })) return;
        }
      }
    }

    function triggerRewardBurst(type) {
      rewardBurst.style.setProperty("--burst-color", CONFIG.colors[type]);
      rewardBurst.classList.remove("active");
      void rewardBurst.offsetWidth;
      rewardBurst.classList.add("active");
      clearTimeout(triggerRewardBurst._t);
      triggerRewardBurst._t = setTimeout(() => rewardBurst.classList.remove("active"), 520);
    }

    function hexToRgb(hex) {
      const h = hex.replace("#", "");
      const bigint = parseInt(h, 16);
      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
      };
    }

    function varyColor(hex, spread = 20) {
      const c = hexToRgb(hex);
      const clamp = v => Math.max(0, Math.min(255, v));
      const drift = () => Math.floor((Math.random() - 0.5) * spread * 2);
      return `rgb(${clamp(c.r + drift())}, ${clamp(c.g + drift())}, ${clamp(c.b + drift())})`;
    }

    async function loadRayJumpPose() {
      if (rayState.jumpPose) return rayState.jumpPose;
      if (!rayState.loadPromise) {
        rayState.loadPromise = fetch(RAY_SOURCE_PATH)
          .then(response => response.text())
          .then(source => {
            const start = source.indexOf("jump:");
            const end = source.indexOf("\n\n};", start);
            if (start === -1 || end === -1) throw new Error("Ray jump pose source not found");
            const rawPose = source
              .slice(start + 5, end)
              .trim()
              .replace(/,$/, "")
              .replace(/(\bpalette\b|\brows\b)\s*:/g, '"$1":');
            rayState.jumpPose = JSON.parse(rawPose);
            return rayState.jumpPose;
          })
          .catch(error => {
            rayState.loadPromise = null;
            throw error;
          });
      }

      return rayState.loadPromise;
    }

    function renderRayJumpPose(pose) {
      rayCtx.clearRect(0, 0, rayCanvas.width, rayCanvas.height);
      for (let y = 0; y < pose.rows.length; y++) {
        const row = pose.rows[y];
        for (let x = 0; x < row.length; x++) {
          const index = row[x];
          if (index === 0) continue;
          rayCtx.fillStyle = pose.palette[index];
          rayCtx.fillRect(x, y, 1, 1);
        }
      }
    }

    async function playRayCelebration() {
      rayState.token += 1;

      try {
        const pose = await loadRayJumpPose();
        renderRayJumpPose(pose);
        rayPop.classList.remove("active");
        void rayPop.offsetWidth;
        rayPop.classList.add("active");
        clearTimeout(playRayCelebration._t);
        playRayCelebration._t = setTimeout(() => rayPop.classList.remove("active"), 1500);
      } catch (error) {
        console.error("Unable to load Ray jump pose", error);
      }
    }

    function fxLoop() {
      fxCtx.clearRect(0, 0, innerWidth, innerHeight);
      fxCtx.save();
      fxCtx.globalCompositeOperation = "lighter";

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.vx = (p.vx + p.drift) * p.drag;
        p.vy = p.vy * p.drag + p.g;
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 1;
        p.size *= p.shrink;

        const offscreen = p.x < -28 || p.x > innerWidth + 28 || p.y < -28 || p.y > innerHeight + 28;
        if (p.life <= 0 || p.size <= 0.32 || offscreen) {
          recycleParticleAt(i);
          continue;
        }

        if (p.trailMax) {
          p.trail.unshift({ x: p.x, y: p.y });
          if (p.trail.length > p.trailMax) p.trail.length = p.trailMax;
        }

        const progress = 1 - p.life / p.maxLife;
        const fadeProgress = progress < p.fadeStart
          ? 1
          : 1 - (progress - p.fadeStart) / p.fadeRange;
        p.alpha = Math.max(0, Math.min(1, fadeProgress));

        if (p.trail.length > 1) {
          fxCtx.beginPath();
          fxCtx.moveTo(p.trail[0].x, p.trail[0].y);
          for (let t = 1; t < p.trail.length; t++) {
            fxCtx.lineTo(p.trail[t].x, p.trail[t].y);
          }
          fxCtx.strokeStyle = rgbaFromChannels(p.channels, p.alpha * FIREWORKS_CONFIG.trailAlphaMultiplier);
          fxCtx.lineWidth = Math.max(FIREWORKS_CONFIG.minTrailWidth, p.size * FIREWORKS_CONFIG.trailWidthMultiplier);
          fxCtx.shadowBlur = p.size > 1.35 ? p.glow : 0;
          fxCtx.shadowColor = p.color;
          fxCtx.stroke();
        }

        const shimmer = p.twinkle
          ? Math.max(0, 1 - p.twinkle * Math.sin((p.maxLife - p.life) * FIREWORKS_CONFIG.twinkleFrequency + p.phase))
          : 1;
        const drawSize = Math.max(FIREWORKS_CONFIG.minParticleSize, p.size * shimmer);

        fxCtx.fillStyle = rgbaFromChannels(p.channels, p.alpha);
        fxCtx.shadowBlur = drawSize > 1.35 ? p.glow : 0;
        fxCtx.shadowColor = p.color;
        if (drawSize <= 1.35) {
          fxCtx.fillRect(p.x - drawSize / 2, p.y - drawSize / 2, drawSize, drawSize);
        } else {
          fxCtx.beginPath();
          fxCtx.arc(p.x, p.y, drawSize, 0, Math.PI * 2);
          fxCtx.fill();
        }
      }

      fxCtx.restore();
      requestAnimationFrame(fxLoop);
    }

    function onWin(index) {
      const reward = CONFIG.segments[index];
      const from = balances[reward.type];
      balances[reward.type] += reward.value;

      tweenBalance(reward.type, from, balances[reward.type], 820);
      pulsePill(reward.type);
      flyRewardIcons(reward.type, reward.value);
      triggerRewardBurst(reward.type);
      spawnFireworks(reward.type);
      playRayCelebration();
      showMessage(`+${reward.value} ${reward.type}`);
    }

    function onSpin() {
      if (spinning) return;

      if (balances.neuron < CONFIG.spinCost) {
        showMessage("Not enough neurons");
        return;
      }

      const from = balances.neuron;
      balances.neuron -= CONFIG.spinCost;
      tweenBalance("neuron", from, balances.neuron, 320);
      pulsePill("neuron");

      const winIndex = Math.floor(Math.random() * CONFIG.segments.length);
      spinTo(winIndex);
    }

    spinBtn.addEventListener("click", onSpin);
    window.addEventListener("resize", resizeCanvas);

    renderWheel();
    renderBulbs();
    renderBalances();
    resizeCanvas();
    loadRayJumpPose().catch(() => {});
    startBulbLoop(220);
    requestAnimationFrame(fxLoop);
  </script>
</body>
</html>
