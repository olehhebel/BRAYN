<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BRAYN – Spin</title>
<style>
/* ── DESIGN TOKENS ──────────────────────────────────────── */
:root{
  --ui-pink:#FF1296;
  --ui-lime:#D5F20E;
  --ui-cyan:#00FFFF;
  --rim-pink:#E3007B;
  --glow-pink:0 0 8px #FF1296,0 0 20px #FF129666;
  --glow-lime:0 0 8px #D5F20E,0 0 20px #D5F20E66;
  --glow-cyan:0 0 8px #00FFFF,0 0 20px #00FFFF66;
}

/* ── RESET ──────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif}

/* ── APP SHELL ──────────────────────────────────────────── */
#app{
  position:relative;
  width:100vw;height:100vh;
  max-width:430px;
  margin:0 auto;
  overflow:hidden;
}
#bg-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;object-position:center top;
}
/* fallback gradient if bg.png fails */
#app::before{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 130% 65% at 50% 22%,#0b1650,#030820 45%,#010209 80%),
    radial-gradient(ellipse 80% 40% at 50% 88%,#050b1e,#010209 60%);
  z-index:-1;
}

/* ── PARTICLE CANVAS ────────────────────────────────────── */
#fx-canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:200;
}

/* ── STAR CANVAS ────────────────────────────────────────── */
#star-canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:1;
}

/* ── RESOURCE BAR ───────────────────────────────────────── */
#resource-bar{
  position:absolute;top:0;left:0;right:0;
  z-index:100;
  display:flex;justify-content:center;align-items:center;
  gap:10px;
  padding:max(env(safe-area-inset-top,0px),14px) 16px 10px;
  background:linear-gradient(to bottom,rgba(0,0,0,.75) 60%,transparent);
}
.pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(5,8,30,.6);
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:5px 12px 5px 5px;
  backdrop-filter:blur(12px);
  transition:box-shadow .3s ease,border-color .3s ease;
}
.pill.win-glow-neuron   {box-shadow:0 0 18px rgba(255,18,150,.7);border-color:rgba(255,18,150,.5)}
.pill.win-glow-axon     {box-shadow:0 0 18px rgba(213,242,14,.7);border-color:rgba(213,242,14,.5)}
.pill.win-glow-min      {box-shadow:0 0 18px rgba(0,255,255,.7);border-color:rgba(0,255,255,.5)}
.pill-icon{
  width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.pill-icon img{width:26px;height:26px;object-fit:contain}
@keyframes icon-bounce{
  0%{transform:scale(1)}40%{transform:scale(1.38)}70%{transform:scale(.9)}100%{transform:scale(1)}
}
.pill.pop .pill-icon img{animation:icon-bounce .45s ease-out}
/* Flying reward icons */
.fly-icon{
  position:absolute;
  pointer-events:none;
  z-index:300;
  width:32px;height:32px;
  object-fit:contain;
  will-change:transform,opacity;
}
.pill-count{
  font-size:15px;font-weight:800;letter-spacing:.4px;
  white-space:nowrap;min-width:26px;text-align:right;
}
.pill-count.neuron{color:var(--ui-pink);text-shadow:var(--glow-pink)}
.pill-count.axon  {color:var(--ui-lime);text-shadow:var(--glow-lime)}
.pill-count.min   {color:var(--ui-cyan);text-shadow:var(--glow-cyan)}

/* ── WHEEL WRAP ─────────────────────────────────────────── */
#wheel-wrap{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-44%);
  width:min(92vw,480px);
  aspect-ratio:1/1;
}

/* Rim ring (fixed, not rotating) */
#rim-ring{
  position:absolute;
  width:96.8%;height:96.8%;
  top:1.6%;left:1.6%;
  border-radius:50%;
  border:14px solid var(--rim-pink);
  box-shadow:0 0 22px var(--rim-pink),0 0 50px rgba(227,0,123,.35),
             inset 0 0 14px rgba(227,0,123,.18);
  pointer-events:none;
  z-index:10;
}

/* Bulb ring */
#bulb-ring{position:absolute;inset:0;pointer-events:none;z-index:15}
.bulb{
  position:absolute;
  width:11px;height:11px;
  border-radius:50%;
  background:rgba(255,255,255,.12);
  transform-origin:center center;
}

/* Wheel SVG image — rotated by JS */
#wheel-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:contain;
  transform-origin:center center;
  pointer-events:none;
}

/* Pointer: lime triangle pointing downward, fixed at 12 o'clock */
#pointer{
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:0;height:0;
  border-left:14px solid transparent;
  border-right:14px solid transparent;
  border-top:24px solid var(--ui-lime);
  filter:drop-shadow(0 0 7px var(--ui-lime)) drop-shadow(0 0 14px rgba(213,242,14,.55));
  z-index:60;
}

/* GO button */
#go-btn{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:clamp(96px,27%,130px);
  height:clamp(96px,27%,130px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  border-radius:50%;
  background:radial-gradient(circle at 40% 34%, #EAFF50, #B8D400 55%, #7A8E00);
  color:#000;
  font-size:clamp(22px,5.5%,32px);
  font-weight:900;letter-spacing:2px;
  border:none;cursor:pointer;
  box-shadow:0 0 22px rgba(184,212,0,.65),0 4px 0 #5A6E00,
             inset 0 -5px 10px rgba(0,0,0,.22),inset 0 4px 6px rgba(255,255,255,.28);
  z-index:70;
  transition:transform .12s ease,box-shadow .12s ease,filter .12s ease;
}
#go-btn > span{
  position:relative;
  z-index:1;
}
#go-btn-label{line-height:1}
#go-btn-cost{
  display:flex;
  align-items:center;
  gap:4px;
  font-size:clamp(13px,3.2vw,17px);
  font-weight:800;
  letter-spacing:.4px;
  line-height:1;
}
#go-btn-cost img{
  width:18px;
  height:18px;
  display:block;
  object-fit:contain;
}
#go-btn::after{
  content:'';
  position:absolute;
  top:8%;left:14%;
  width:72%;height:38%;
  background:linear-gradient(to bottom,rgba(255,255,255,.55),rgba(255,255,255,.05));
  border-radius:50%;
}
#go-btn:not(.disabled):active,
#go-btn.pressed{
  transform:translate(-50%,-48%) scale(0.92);
  box-shadow:0 0 14px rgba(184,212,0,.5),0 1px 0 #5A6E00;
  filter:brightness(.88);
}
#go-btn.disabled{opacity:.6;pointer-events:none}

/* Wheel scale-pulse on spin start */
@keyframes wheel-pulse{
  0%{transform:translate(-50%,-44%) scale(1)}
  40%{transform:translate(-50%,-44%) scale(1.034)}
  100%{transform:translate(-50%,-44%) scale(1)}
}
#wheel-wrap.pulse-start{animation:wheel-pulse .36s ease-out}

/* ── REDUCED MOTION ─────────────────────────────────────── */
@media(prefers-reduced-motion:reduce){
  .pill,.pill-count,#go-btn{transition:none}
  @keyframes icon-bounce{from{}to{}}
  @keyframes wheel-pulse{from{}to{}}
}
</style>
</head>

<script>
/* ════════════════════════════════════════════════════════
   BRAYN Wheel of Fortune  -  inline JS, no external deps
   ════════════════════════════════════════════════════════ */

/* ── 1. SEGMENT CONFIG ──────────────────────────────────── */
const SEGMENTS = [
  {resource:'axon',   value:20,  color:'#D5F20E'},
  {resource:'neuron', value:5,   color:'#FF1296'},
  {resource:'axon',   value:300, color:'#D5F20E'},
  {resource:'min',    value:35,  color:'#00FFFF'},
  {resource:'neuron', value:5,   color:'#FF1296'},
  {resource:'axon',   value:2,   color:'#D5F20E'},
  {resource:'min',    value:2,   color:'#00FFFF'},
  {resource:'neuron', value:234, color:'#FF1296'},
];
const SPIN_COST = 300;
const WEIGHTS  = SEGMENTS.map(()=>1);
const SEG_N    = SEGMENTS.length;   // 8
const SEG_DEG  = 360 / SEG_N;      // 45

/* ── 2. RESOURCE STORE + LOCALSTORAGE ───────────────────── */
const DEFAULTS = {neuron:1000, axon:1, min:20};
let store = {};
(()=>{
  try{
    const saved = JSON.parse(localStorage.getItem('brayn_wof_brayn_store'));
    if(saved && typeof saved==='object'){
      // neuron always resets to default on load (demo balance restore)
      store = {...DEFAULTS, ...saved, neuron: DEFAULTS.neuron};
    } else {
      store = {...DEFAULTS};
    }
  } catch {
    try{ localStorage.removeItem('brayn_wof_brayn_store'); }catch{}
    store = {...DEFAULTS};
  }
  ['neuron','axon','min'].forEach(k=>{
    const el = document.getElementById('count-'+k);
    if(el) el.textContent = store[k];
  });
})();
function persistStore(){
  try{ localStorage.setItem('brayn_wof_brayn_store', JSON.stringify(store)); }catch{}
}
function canAffordSpin(){
  return (store.neuron || 0) >= SPIN_COST;
}
function syncGoButtonState(){
  const btn = document.getElementById('go-btn');
  if(!btn) return;
  const disabled = spinState !== 'idle' || !canAffordSpin();
  btn.classList.toggle('disabled', disabled);
  btn.disabled = disabled;
  btn.setAttribute('aria-disabled', disabled ? 'true' : 'false');
}

/* ── 3. EASING + HELPERS ────────────────────────────────── */
function easeOutQuint(t){ return 1 - Math.pow(1-t, 5); }
function easeInCubic(t) { return t*t*t; }
function spinEase(t){
  if(t < 0.08) return easeInCubic(t/0.08) * 0.08;
  const tt = (t-0.08) / 0.92;
  return 0.08 + easeOutQuint(tt) * 0.92;
}
function normalizeAngle(a){ return ((a%360)+360)%360; }

/* ── 4. WHEEL SVG BUILDER (PNG icons from pill elements) ── */
function buildWheelSVG(){
  const neuronImg = document.querySelector('#pill-neuron .pill-icon img');
  const axonImg   = document.querySelector('#pill-axon .pill-icon img');
  const minImg    = document.querySelector('#pill-min .pill-icon img');

  function makeSym(id, imgEl){
    if(!imgEl) return '';
    return `<symbol id="${id}" viewBox="0 0 128 128"><image href="${imgEl.src}" width="128" height="128" preserveAspectRatio="xMidYMid meet"/></symbol>`;
  }

  const cx=250, cy=250, R=208;
  const N=SEGMENTS.length;
  const segAng=360/N;
  const segColors=['#1B1FB9','#1557FF'];

  function pt(deg, r){
    const rad=(deg-90)*Math.PI/180;
    return [+(cx+r*Math.cos(rad)).toFixed(1), +(cy+r*Math.sin(rad)).toFixed(1)];
  }

  let paths='', groups='';
  SEGMENTS.forEach((seg,i)=>{
    const s=i*segAng, e=(i+1)*segAng, mid=s+segAng/2;
    const [x1,y1]=pt(s,R), [x2,y2]=pt(e,R);
    const col=segColors[i%2];
    paths+=`<path d="M${cx},${cy} L${x1},${y1} A${R},${R},0,0,1,${x2},${y2} Z" fill="${col}" stroke="rgba(255,255,255,.08)" stroke-width="1"/>\n`;
    paths+=`<line x1="${cx}" y1="${cy}" x2="${x1}" y2="${y1}" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>\n`;

    const [gx,gy]=pt(mid,145);
    groups+=`<g transform="translate(${gx},${gy}) rotate(${mid.toFixed(1)})">\n`;
    groups+=`  <use href="#ic-${seg.resource}" x="-22" y="-54" width="44" height="44" filter="url(#fg)"/>\n`;
    groups+=`  <text x="0" y="24" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="900" fill="${seg.color}" filter="url(#fg)">${seg.value}</text>\n`;
    groups+=`</g>\n`;
  });

  return `<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="fg" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  ${makeSym('ic-neuron',neuronImg)}
  ${makeSym('ic-axon',axonImg)}
  ${makeSym('ic-min',minImg)}
</defs>
${paths}${groups}<circle cx="250" cy="250" r="76" fill="#07102e" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
</svg>`;
}

function initWheelSVG(){
  const svg = buildWheelSVG();
  const img = document.getElementById('wheel-img');
  if(!img) return;
  img.src = 'data:image/svg+xml;base64,' + btoa(svg);
}

/* ── 5. BULB SETUP ──────────────────────────────────────── */
const N_BULBS   = 24;
let   bulbTimer = null;

function buildBulbs(){
  const ring = document.getElementById('bulb-ring');
  ring.innerHTML = '';
  for(let i=0; i<N_BULBS; i++){
    const b = document.createElement('div');
    b.className = 'bulb';
    b.id = 'bulb-'+i;
    ring.appendChild(b);
  }
  positionBulbs();
}

function positionBulbs(){
  const wrap = document.getElementById('wheel-wrap');
  if(!wrap) return;
  const size   = wrap.offsetWidth;
  const bulbR  = size * 0.455;
  const cx = size/2, cy = size/2;
  for(let i=0; i<N_BULBS; i++){
    const b = document.getElementById('bulb-'+i);
    if(!b) continue;
    const ang = (i * 360/N_BULBS - 90) * Math.PI/180;
    const bx  = cx + bulbR * Math.cos(ang);
    const by  = cy + bulbR * Math.sin(ang);
    b.style.left = (bx - 5.5) + 'px';
    b.style.top  = (by - 5.5) + 'px';
  }
}

/* ── 6. BULB ANIMATION CONTROLLER ──────────────────────── */
function setBulbState(state){
  clearInterval(bulbTimer);
  const bulbs = Array.from(document.querySelectorAll('.bulb'));
  if(!bulbs.length) return;

  const interval = state==='idle' ? 260 : state==='spinning' ? 110 : 60;
  let frame = 0;

  function tick(){
    frame++;
    bulbs.forEach((b, i)=>{
      let on;
      if(state==='idle'){
        on = (i%2===0) === (frame%2===0);
      } else if(state==='spinning'){
        on = ((i - frame*2) & 3) === 0;
      } else {
        on = (frame%2===0);
      }
      if(on){
        b.style.background  = i%3===0 ? '#FFFFFF' : '#FFB0E0';
        b.style.boxShadow   = `0 0 9px ${i%3===0?'#FFFFFF':'#FF1296'},0 0 16px #FF129666`;
        b.style.opacity     = '1';
        b.style.transform   = 'scale(1.18)';
      } else {
        b.style.background  = 'rgba(255,255,255,.12)';
        b.style.boxShadow   = 'none';
        b.style.opacity     = '.5';
        b.style.transform   = 'scale(1)';
      }
    });
  }
  tick();
  bulbTimer = setInterval(tick, interval);
}

/* ── 7. SPIN STATE MACHINE ──────────────────────────────── */
let spinState     = 'idle';
let wheelAngle    = 0;
let spinRaf       = null;
let winSegIdx     = 0;

let spinStart=0, spinDuration=0, spinStartAngle=0, spinEndAngle=0;

function weightedRandom(){
  const total = WEIGHTS.reduce((a,b)=>a+b, 0);
  let r = Math.random() * total;
  for(let i=0; i<WEIGHTS.length; i++){ r -= WEIGHTS[i]; if(r<=0) return i; }
  return WEIGHTS.length-1;
}

function segCenterAngle(idx){
  return idx * SEG_DEG + SEG_DEG/2;
}

function targetAngleForSeg(segIdx, currentAngle){
  const segCenter = segCenterAngle(segIdx);
  const desired   = normalizeAngle(360 - segCenter);
  const curNorm   = normalizeAngle(currentAngle);

  let diff = normalizeAngle(desired - curNorm);
  if(diff < 30) diff += 360;

  const extraRot = (Math.floor(Math.random()*4) + 5) * 360;
  return currentAngle + extraRot + diff;
}

function applyWheelRotation(angle){
  const img = document.getElementById('wheel-img');
  if(img) img.style.transform = `rotate(${angle}deg)`;
}

function startSpin(){
  if(spinState !== 'idle' || !canAffordSpin()) return;
  store.neuron -= SPIN_COST;
  persistStore();
  const neuronCount = document.getElementById('count-neuron');
  if(neuronCount) neuronCount.textContent = store.neuron;
  spinState = 'spinning';
  syncGoButtonState();

  winSegIdx        = weightedRandom();
  spinStartAngle   = wheelAngle;
  spinEndAngle     = targetAngleForSeg(winSegIdx, wheelAngle);
  spinDuration     = 4200 + Math.random() * 1600;
  spinStart        = performance.now();

  const wrap = document.getElementById('wheel-wrap');
  wrap.classList.add('pulse-start');
  setTimeout(()=> wrap.classList.remove('pulse-start'), 400);

  setBulbState('spinning');
  playSound('spin_start');

  let lastTick = Math.floor(normalizeAngle(wheelAngle) / SEG_DEG);

  function frame(now){
    const elapsed = now - spinStart;
    const t       = Math.min(1, elapsed / spinDuration);
    const eased   = spinEase(t);

    wheelAngle = spinStartAngle + (spinEndAngle - spinStartAngle) * eased;
    applyWheelRotation(wheelAngle);

    const curTick = Math.floor(normalizeAngle(wheelAngle) / SEG_DEG);
    if(curTick !== lastTick){ lastTick = curTick; playSound('tick'); }

    if(t < 1){
      spinRaf = requestAnimationFrame(frame);
    } else {
      wheelAngle = spinEndAngle;
      applyWheelRotation(wheelAngle);
      onWinLand();
    }
  }
  spinRaf = requestAnimationFrame(frame);
}

function onWinLand(){
  setBulbState('landing');
  setTimeout(()=> setBulbState('idle'), 700);
  playSound('win_impact');

  const overshoot = 1.5;
  const overStart = performance.now();
  (function overFrame(now){
    const t = Math.min(1, (now - overStart) / 180);
    const ov = overshoot * (t < 0.5
      ? easeOutQuint(t*2)
      : (1 - easeOutQuint((t-0.5)*2)));
    applyWheelRotation(spinEndAngle + ov);
    if(t < 1) requestAnimationFrame(overFrame);
    else       applyWheelRotation(spinEndAngle);
  })(performance.now());

  setTimeout(()=>{
    const seg = SEGMENTS[winSegIdx];
    store[seg.resource] += seg.value;
    persistStore();
    animateCount(seg.resource, store[seg.resource] - seg.value, store[seg.resource]);
    triggerWinGlow(seg.resource);
    launchFireworks(seg.resource);
    launchIconFly(seg.resource);
    playSound('resource_add');

    setTimeout(()=>{
      spinState = 'idle';
      syncGoButtonState();
    }, 1800);
  }, 350);
}

/* ── 8. HEADER COUNT-UP ANIMATION ──────────────────────── */
function animateCount(resource, from, to){
  const el = document.getElementById('count-'+resource);
  if(!el) return;
  const duration = 700 + Math.random()*400;
  const start    = performance.now();
  (function tick(now){
    const t     = Math.min(1, (now - start) / duration);
    const eased = easeOutQuint(t);
    el.textContent = Math.round(from + (to - from) * eased);
    if(t < 1) requestAnimationFrame(tick);
    else       el.textContent = to;
  })(performance.now());

  const pill = document.getElementById('pill-'+resource);
  if(pill){
    pill.classList.add('pop');
    setTimeout(()=> pill.classList.remove('pop'), 500);
  }
}

function triggerWinGlow(resource){
  ['neuron','axon','min'].forEach(r=>{
    document.getElementById('pill-'+r)?.classList.remove('win-glow-'+r);
  });
  const pill = document.getElementById('pill-'+resource);
  if(pill){
    pill.classList.add('win-glow-'+resource);
    setTimeout(()=> pill.classList.remove('win-glow-'+resource), 1800);
  }
}

/* ── 9b. FLYING ICON ANIMATION ──────────────────────────── */
function launchIconFly(resource){
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  const app  = document.getElementById('app');
  const wrap = document.getElementById('wheel-wrap');
  const pill = document.getElementById('pill-'+resource);
  if(!app || !wrap || !pill) return;

  const appRect  = app.getBoundingClientRect();
  const wrapRect = wrap.getBoundingClientRect();
  const pillIcon = pill.querySelector('.pill-icon') || pill;
  const pillRect = pillIcon.getBoundingClientRect();

  const sx = (wrapRect.left + wrapRect.right)  / 2 - appRect.left;
  const sy = (wrapRect.top  + wrapRect.bottom) / 2 - appRect.top;
  const ex = (pillRect.left + pillRect.right)  / 2 - appRect.left;
  const ey = (pillRect.top  + pillRect.bottom) / 2 - appRect.top;

  const N = 6;
  const STAGGER = 110; // ms between each icon launch

  // standard easeInOutCubic: smooth acceleration + deceleration
  function easeInOutCubic(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

  function spawnOne(delay, idx){
    setTimeout(()=>{
      const el = document.createElement('img');
      el.src = `assets/icons/${resource}.png`;
      el.className = 'fly-icon';
      el.style.left    = (sx - 16) + 'px';
      el.style.top     = (sy - 16) + 'px';
      el.style.opacity = '0';
      el.style.transform = 'scale(0)';
      app.appendChild(el);

      // Arc control point: above midpoint, slight lateral spread
      const spread = (idx % 2 === 0 ? 1 : -1) * (30 + Math.random() * 60);
      const cpx = (sx + ex) / 2 + spread;
      const cpy = Math.min(sy, ey) - 90 - Math.random() * 70;
      const dur  = 620 + Math.random() * 180;
      const t0   = performance.now();

      (function tick(now){
        const raw  = Math.min(1, (now - t0) / dur);
        const t    = easeInOutCubic(raw);
        const mt   = 1 - t;

        // Quadratic bezier path
        const x = mt*mt*sx + 2*mt*t*cpx + t*t*ex;
        const y = mt*mt*sy + 2*mt*t*cpy + t*t*ey;

        // Scale: grow for first 20%, hold, shrink for last 25%
        const sc  = raw < 0.20 ? raw / 0.20
                  : raw > 0.75 ? (1 - raw) / 0.25
                  : 1;
        // Opacity: fade in first 10%, full, fade out last 20%
        const op  = raw < 0.10 ? raw / 0.10
                  : raw > 0.80 ? (1 - raw) / 0.20
                  : 1;

        el.style.left      = (x - 16) + 'px';
        el.style.top       = (y - 16) + 'px';
        el.style.opacity   = Math.max(0, op);
        el.style.transform = `scale(${Math.max(0, sc)})`;

        if(raw < 1){ requestAnimationFrame(tick); }
        else        { el.remove(); }
      })(performance.now());
    }, delay);
  }

  for(let i = 0; i < N; i++) spawnOne(i * STAGGER, i);
}

/* ── 9. ADVANCED PARTICLE / FIREWORKS SYSTEM ─────────────── */
const canvas = document.getElementById('fx-canvas');
const ctx    = canvas.getContext('2d');
let   particles = [];
let   fxRaf     = null;

function resizeCanvas(){
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', ()=>{ resizeCanvas(); positionBulbs(); });

const COLORS_BY_RES = {
  neuron: ['#FF1296','#FF4DB8','#FF70CC','#FFB0E0','#FF00AA','#CC006E','#FF87D4','#FF2DA0'],
  axon:   ['#D5F20E','#EEFF5A','#C2DC00','#F0FF70','#A8C800','#B8E000','#DAFF20','#8FAF00'],
  min:    ['#00FFFF','#80FFFF','#00E5E5','#AAFFFF','#00CCCC','#40FFFF','#00B8B8','#C8FFFF'],
};

function launchFireworks(resource){
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){
    const cols=COLORS_BY_RES[resource];
    const app=document.getElementById('app'), wrap=document.getElementById('wheel-wrap');
    const aRect=app.getBoundingClientRect(), wRect=wrap.getBoundingClientRect();
    const sx=canvas.width/app.offsetWidth, sy=canvas.height/app.offsetHeight;
    const wcx=((wRect.left+wRect.right)/2-aRect.left)*sx;
    const wcy=((wRect.top+wRect.bottom)/2-aRect.top)*sy;
    particles.push({type:'flash',x:wcx,y:wcy,r:0,maxR:80,color:cols[0],life:1,decay:0.055});
    startFxLoop();
    return;
  }

  const cols = COLORS_BY_RES[resource];
  const app  = document.getElementById('app');
  const wrap = document.getElementById('wheel-wrap');
  const aRect = app.getBoundingClientRect();
  const wRect = wrap.getBoundingClientRect();

  const scaleX = canvas.width  / app.offsetWidth;
  const scaleY = canvas.height / app.offsetHeight;
  const wcx = ((wRect.left + wRect.right)  / 2 - aRect.left) * scaleX;
  const wcy = ((wRect.top  + wRect.bottom) / 2 - aRect.top)  * scaleY;
  const wRadPx = (wRect.width / 2) * scaleX;

  particles.push({type:'flash', x:wcx, y:wcy, r:0, maxR:140, color:cols[0], life:1, decay:0.038});
  setTimeout(()=>{
    particles.push({type:'flash',x:wcx,y:wcy,r:0,maxR:110,color:cols[1]||cols[0],life:1,decay:0.048});
  }, 110);
  setTimeout(()=>{
    particles.push({type:'flash',x:wcx,y:wcy,r:0,maxR:70,color:cols[3]||cols[0],life:1,decay:0.062});
  }, 200);

  for(let i=0; i<90; i++){
    const a=Math.random()*Math.PI*2, s=3+Math.random()*16;
    particles.push({type:'spark', x:wcx, y:wcy,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s-2.2,
      r:2.5+Math.random()*6, color:cols[i%cols.length],
      life:1, decay:0.012+Math.random()*0.016, gravity:0.15});
  }

  for(let i=0; i<30; i++){
    const a=Math.random()*Math.PI*2, s=8+Math.random()*20;
    particles.push({type:'streak', x:wcx, y:wcy,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s-3,
      r:1.8+Math.random()*3, color:cols[i%cols.length],
      life:1, decay:0.022+Math.random()*0.022, gravity:0.10,
      px:wcx, py:wcy});
  }

  for(let i=0; i<42; i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*4.5;
    particles.push({type:'ember', x:wcx+(Math.random()-0.5)*80, y:wcy+(Math.random()-0.5)*80,
      vx:Math.cos(a)*s*0.7+(Math.random()-0.5)*2, vy:Math.sin(a)*s*0.7-4-Math.random()*3.5,
      r:1.2+Math.random()*3.2, color:cols[i%cols.length],
      life:1, decay:0.007+Math.random()*0.008, gravity:0.22,
      wobble:(Math.random()-0.5)*0.25});
  }

  for(let b=0; b<11; b++){
    const ba=b*(Math.PI*2/11)+Math.random()*0.5;
    const dist=wRadPx*(0.55+Math.random()*0.55);
    const fx=wcx+Math.cos(ba)*dist, fy=wcy+Math.sin(ba)*dist;
    setTimeout(()=> spawnShell(fx, fy, cols), b*75+140);
  }

  startFxLoop();
}

function spawnShell(ox, oy, cols){
  for(let i=0; i<34; i++){
    const a=Math.random()*Math.PI*2, s=2.2+Math.random()*7.5;
    particles.push({type:'spark', x:ox, y:oy,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      r:1.8+Math.random()*3.8, color:cols[i%cols.length],
      life:1, decay:0.020+Math.random()*0.024, gravity:0.12});
  }
  for(let i=0; i<9; i++){
    const a=Math.random()*Math.PI*2;
    particles.push({type:'star', x:ox, y:oy,
      vx:Math.cos(a)*2.2, vy:Math.sin(a)*2.2-0.8,
      r:1.8+Math.random()*2.5, color:'#FFFFFF',
      life:1, decay:0.024+Math.random()*0.022, gravity:0.06});
  }
  for(let i=0; i<12; i++){
    const a=Math.random()*Math.PI*2;
    particles.push({type:'ember', x:ox, y:oy,
      vx:Math.cos(a)*2.2, vy:Math.sin(a)*2.2-2.8,
      r:1+Math.random()*2.2, color:cols[i%cols.length],
      life:1, decay:0.009+Math.random()*0.010, gravity:0.20,
      wobble:(Math.random()-0.5)*0.22});
  }
}

function startFxLoop(){
  if(fxRaf) return;
  function loop(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p=>p.life>0);
    particles.forEach(p=>{
      if(p.type==='flash'){
        p.r   += p.maxR * p.decay * 2.8;
        p.life -= p.decay;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life * 0.52);
        const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
        g.addColorStop(0, p.color); g.addColorStop(1,'transparent');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
        ctx.restore();
      } else if(p.type==='streak'){
        const ox=p.x, oy=p.y;
        p.x+=p.vx; p.y+=p.vy;
        p.vy+=p.gravity||0; p.vx*=0.97; p.vy*=0.97;
        p.life-=p.decay;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life * 0.85);
        ctx.shadowBlur  = 7;
        ctx.shadowColor = p.color;
        ctx.strokeStyle = p.color;
        ctx.lineWidth   = p.r * Math.max(0.15, p.life);
        ctx.lineCap     = 'round';
        ctx.beginPath();
        ctx.moveTo(p.px||ox, p.py||oy);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        ctx.restore();
        p.px=p.x; p.py=p.y;
      } else if(p.type==='ember'){
        p.x+=p.vx+(p.wobble||0);
        p.y+=p.vy;
        p.vy+=p.gravity||0.22;
        p.vx*=0.992;
        p.life-=p.decay;
        if(p.wobble!==undefined) p.wobble+=(Math.random()-0.5)*0.03;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life * 0.78);
        ctx.shadowBlur  = 5;
        ctx.shadowColor = p.color;
        ctx.fillStyle   = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * Math.max(0.1, p.life), 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      } else {
        p.x+=p.vx; p.y+=p.vy;
        p.vy+=p.gravity||0; p.vx*=0.98; p.vy*=0.98;
        p.life-=p.decay;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life * 0.9);
        ctx.shadowBlur  = p.type==='star' ? 4 : 9;
        ctx.shadowColor = p.color;
        ctx.fillStyle   = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * Math.max(0.2, p.life), 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
    });
    if(particles.length>0){ fxRaf=requestAnimationFrame(loop); }
    else{ fxRaf=null; ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  fxRaf = requestAnimationFrame(loop);
}

/* ── 10. STAR BACKGROUND CANVAS ─────────────────────────── */
function initStarCanvas(){
  const sc = document.getElementById('star-canvas');
  if(!sc) return;
  const ctx2 = sc.getContext('2d');
  if(!ctx2) return;

  const N_STARS = 165;
  const stars = [];

  function genStars(){
    stars.length = 0;
    for(let i=0; i<N_STARS; i++){
      const big = Math.random() < 0.07;
      stars.push({
        x:    Math.random(),
        y:    Math.random(),
        r:    big ? 1.6+Math.random()*1.4 : 0.35+Math.random()*1.2,
        base: big ? 0.55+Math.random()*0.35 : 0.12+Math.random()*0.48,
        phase:Math.random()*Math.PI*2,
        speed:0.25+Math.random()*1.0,
        color:Math.random()<0.78 ? '#FFFFFF'
              : Math.random()<0.6 ? '#B8D0FF' : '#FFE8CC'
      });
    }
  }

  function resize(){
    sc.width  = sc.offsetWidth  || window.innerWidth;
    sc.height = sc.offsetHeight || window.innerHeight;
  }

  let starRaf;
  function draw(){
    ctx2.clearRect(0,0,sc.width,sc.height);
    const t = performance.now()/1000;
    stars.forEach(s=>{
      const shimmer = 0.55 + 0.45*Math.sin(s.phase + t*s.speed);
      ctx2.globalAlpha = Math.max(0, s.base * shimmer);
      ctx2.fillStyle   = s.color;
      ctx2.shadowBlur  = s.r > 1.4 ? 5 : 0;
      ctx2.shadowColor = s.color;
      ctx2.beginPath();
      ctx2.arc(s.x*sc.width, s.y*sc.height, s.r, 0, Math.PI*2);
      ctx2.fill();
    });
    ctx2.globalAlpha = 1;
    ctx2.shadowBlur  = 0;
    starRaf = requestAnimationFrame(draw);
  }

  genStars();
  resize();
  window.addEventListener('resize', resize);
  draw();
}

/* ── 11. WEB AUDIO SOUND HOOKS ──────────────────────────── */
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx) try{ audioCtx = new(window.AudioContext||window.webkitAudioContext)(); }catch{}
  return audioCtx;
}
function playSound(event){
  const ac = ensureAudio(); if(!ac) return;
  try{
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    const now = ac.currentTime;
    if(event==='tick'){
      osc.type='sine'; osc.frequency.value=820;
      gain.gain.setValueAtTime(.08,now);
      gain.gain.exponentialRampToValueAtTime(.001,now+.07);
      osc.start(now); osc.stop(now+.07);
    } else if(event==='spin_start'){
      osc.type='sawtooth'; osc.frequency.setValueAtTime(200,now);
      osc.frequency.exponentialRampToValueAtTime(640,now+.16);
      gain.gain.setValueAtTime(.12,now);
      gain.gain.exponentialRampToValueAtTime(.001,now+.22);
      osc.start(now); osc.stop(now+.22);
    } else if(event==='win_impact'){
      osc.type='triangle'; osc.frequency.setValueAtTime(440,now);
      osc.frequency.exponentialRampToValueAtTime(880,now+.08);
      gain.gain.setValueAtTime(.22,now);
      gain.gain.exponentialRampToValueAtTime(.001,now+.55);
      osc.start(now); osc.stop(now+.55);
      const o2=ac.createOscillator(),g2=ac.createGain();
      o2.connect(g2); g2.connect(ac.destination);
      o2.type='sine'; o2.frequency.value=1320;
      g2.gain.setValueAtTime(0,now+.04);
      g2.gain.linearRampToValueAtTime(.17,now+.12);
      g2.gain.exponentialRampToValueAtTime(.001,now+.7);
      o2.start(now+.04); o2.stop(now+.7);
    } else if(event==='resource_add'){
      osc.type='sine'; osc.frequency.value=1046;
      gain.gain.setValueAtTime(.1,now);
      gain.gain.exponentialRampToValueAtTime(.001,now+.25);
      osc.start(now); osc.stop(now+.25);
    }
  }catch{}
}

/* ── 12. EVENT LISTENERS ────────────────────────────────── */
function initListeners(){
  const btn = document.getElementById('go-btn');
  if(!btn) return;

  function setPressed(on){
    if(on){ btn.classList.add('pressed'); }
    else  { btn.classList.remove('pressed'); }
  }
  btn.addEventListener('mousedown',  ()=> setPressed(true));
  btn.addEventListener('mouseup',    ()=> setPressed(false));
  btn.addEventListener('mouseleave', ()=> setPressed(false));
  btn.addEventListener('touchstart', ()=> setPressed(true),  {passive:true});
  btn.addEventListener('touchend',   ()=> setPressed(false), {passive:true});

  function onPress(e){
    e.preventDefault();
    if(spinState !== 'idle' || !canAffordSpin()) return;
    ensureAudio();
    startSpin();
  }
  btn.addEventListener('click',      onPress);
  btn.addEventListener('touchstart', onPress, {passive:false});
}

/* ── 13. INIT ───────────────────────────────────────────── */
function init(){
  buildBulbs();
  initWheelSVG();         // build wheel SVG with actual PNG icons
  applyWheelRotation(wheelAngle);
  setBulbState('idle');
  initListeners();
  initStarCanvas();       // animated star background

  ['neuron','axon','min'].forEach(r=>{
    const el = document.getElementById('count-'+r);
    if(el) el.textContent = store[r];
  });
  syncGoButtonState();
}

document.addEventListener('DOMContentLoaded', init);
</script>
