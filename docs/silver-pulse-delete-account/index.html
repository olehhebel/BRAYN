<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Silver Pulse — Mood Check</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      color-scheme: light;
      --bg: #f3f2fa;
      --text: #0d0d12;
      --muted: #7587e5;
      --card-shadow: 0 10px 26px rgba(140, 149, 199, 0.18);
      --line: rgba(60, 60, 67, 0.16);
      --danger: #ff3b30;
      --menu-shadow: 0 18px 48px rgba(28, 30, 51, 0.16);
      --dialog-shadow: 0 24px 70px rgba(28, 30, 51, 0.2);
      --safe-top: max(env(safe-area-inset-top), 0px);
      --safe-right: max(env(safe-area-inset-right), 0px);
      --safe-bottom: max(env(safe-area-inset-bottom), 0px);
      --safe-left: max(env(safe-area-inset-left), 0px);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      color: var(--text);
    }

    body.overlay-open {
      overflow: hidden;
      touch-action: none;
    }

    button {
      font: inherit;
      color: inherit;
      border: 0;
      background: none;
      cursor: pointer;
    }

    .page {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: clamp(0px, 2vw, 24px);
      background: var(--bg);
    }

    .phone-shell {
      position: relative;
      width: min(100%, 393px);
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      overflow: hidden;
    }

    .screen {
      min-height: 100%;
      padding:
        calc(var(--safe-top) + 8px)
        calc(var(--safe-right) + 32px)
        calc(var(--safe-bottom) + 34px)
        calc(var(--safe-left) + 32px);
      display: flex;
      flex-direction: column;
    }

    .statusbar {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .time {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #27282c;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .hero-copy h1 {
      font-size: clamp(3.15rem, 8.4vw, 3.6rem);
      line-height: 0.94;
      font-weight: 500;
      letter-spacing: -0.08em;
      max-width: 255px;
    }

    .hero-copy p {
      margin-top: 34px;
      max-width: 270px;
      font-size: 1.04rem;
      line-height: 1.18;
      letter-spacing: -0.03em;
      font-weight: 400;
    }

    .profile-trigger {
      flex: 0 0 auto;
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      margin-top: 8px;
      color: var(--muted);
      transition: background-color 180ms ease, transform 180ms ease;
    }

    .profile-trigger:active,
    .mood-card:active,
    .menu-item:active,
    .dialog-button:active,
    .reminder-button:active {
      transform: scale(0.97);
    }

    .profile-trigger:hover,
    .profile-trigger:focus-visible,
    .menu-item:hover,
    .dialog-button:hover,
    .reminder-button:hover {
      background: rgba(117, 135, 229, 0.08);
      outline: none;
    }

    .mood-grid {
      margin-top: 52px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 32px 28px;
    }

    .mood-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 28px;
      padding: 16px 16px 20px;
      box-shadow: var(--card-shadow);
      display: grid;
      gap: 12px;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .mood-card.is-selected {
      box-shadow: 0 0 0 2px rgba(117, 135, 229, 0.3), var(--card-shadow);
    }

    .mood-art {
      position: relative;
      aspect-ratio: 1 / 1.2;
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(180deg, #acd6fb 0%, #7fb8f2 45%, #6aa5e6 100%);
      isolation: isolate;
    }

    .mood-art::before {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 42%;
      background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.18), transparent 32%),
                  linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0.06));
      z-index: 0;
    }

    .mood-art::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 16%;
      width: 34%;
      height: 72%;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.08));
      border: 1.5px solid rgba(255,255,255,0.48);
      box-shadow:
        inset 0 0 18px rgba(255,255,255,0.3),
        inset 0 -10px 18px rgba(255,255,255,0.08),
        0 10px 18px rgba(80, 108, 151, 0.14);
      z-index: 2;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .mood-scene {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .mood-scene.okay {
      background:
        radial-gradient(circle at 50% 12%, rgba(255,245,214,0.98), rgba(255,245,214,0.08) 20%, transparent 36%),
        radial-gradient(circle at 32% 80%, #a4c856 0%, #badf62 22%, transparent 24%),
        radial-gradient(circle at 72% 84%, #b8d85e 0%, #cfe67b 22%, transparent 24%),
        linear-gradient(180deg, #94c7f2 0%, #78b2ec 52%, #84beef 100%);
    }

    .mood-scene.lonely {
      background:
        radial-gradient(circle at 50% 104%, rgba(255,255,255,0.22), transparent 24%),
        radial-gradient(circle at 18% 88%, rgba(255,255,255,0.28) 0 1px, transparent 2px),
        radial-gradient(circle at 78% 84%, rgba(255,255,255,0.22) 0 1.4px, transparent 2.4px),
        radial-gradient(circle at 65% 24%, rgba(255,255,255,0.18), transparent 40%),
        linear-gradient(180deg, #628db3 0%, #6aa8df 54%, #7ec0f0 100%);
    }

    .mood-scene.worried {
      background:
        radial-gradient(circle at 50% 72%, rgba(102,191,255,0.9), rgba(102,191,255,0.12) 20%, transparent 30%),
        radial-gradient(circle at 38% 26%, rgba(33,39,49,0.94), transparent 28%),
        radial-gradient(circle at 58% 28%, rgba(46,52,63,0.96), transparent 32%),
        linear-gradient(180deg, #18212b 0%, #57616f 52%, #202732 100%);
    }

    .mood-scene.tired {
      background:
        radial-gradient(circle at 50% 78%, rgba(212, 169, 120, 0.82), transparent 16%),
        radial-gradient(circle at 84% 20%, rgba(255,255,255,0.32), transparent 36%),
        linear-gradient(180deg, #d3dbe0 0%, #ebe8e2 40%, #dac2a0 76%, #d6b082 100%);
    }

    .terrain,
    .storm,
    .dunes,
    .rain-lines {
      position: absolute;
      inset: auto 0 0;
      pointer-events: none;
    }

    .terrain.okay {
      height: 42%;
      background:
        radial-gradient(140% 100% at 10% 100%, #a8cf4e 0 39%, transparent 40%),
        radial-gradient(120% 100% at 50% 100%, #bddf68 0 40%, transparent 41%),
        radial-gradient(110% 100% at 88% 100%, #b1d85d 0 38%, transparent 39%);
    }

    .terrain.tired {
      height: 35%;
      background:
        radial-gradient(120% 85% at 10% 100%, #d8b687 0 34%, transparent 35%),
        radial-gradient(120% 92% at 56% 100%, #c89b67 0 35%, transparent 36%),
        radial-gradient(120% 100% at 92% 100%, #e2c290 0 32%, transparent 33%);
      opacity: 0.92;
    }

    .storm {
      inset: 0;
      background:
        linear-gradient(120deg, transparent 41%, rgba(115,212,255,0.88) 48%, transparent 56%),
        linear-gradient(300deg, transparent 48%, rgba(142,230,255,0.86) 54%, transparent 60%);
      filter: drop-shadow(0 0 8px rgba(103, 212, 255, 0.78));
      clip-path: polygon(50% 18%, 60% 44%, 54% 44%, 64% 72%, 48% 54%, 54% 54%, 44% 30%);
      opacity: 0.92;
    }

    .rain-lines {
      inset: 0;
      background-image: repeating-linear-gradient(100deg, rgba(255,255,255,0.36) 0 2px, transparent 2px 18px);
      opacity: 0.22;
      transform: scale(1.2);
    }

    .card-label {
      text-align: center;
      font-size: 1.1rem;
      line-height: 1.05;
      letter-spacing: -0.04em;
      font-weight: 400;
      min-height: 2.2em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .footer {
      margin-top: auto;
      padding-top: 46px;
      display: flex;
      justify-content: center;
    }

    .reminder-button {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.2;
      letter-spacing: -0.03em;
      border-radius: 20px;
      padding: 8px 12px;
      transition: background-color 180ms ease, transform 180ms ease;
    }

    .checkbox {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      border: 2.5px solid currentColor;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .checkbox svg {
      opacity: 0;
      transform: scale(0.75);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .reminder-button.is-checked .checkbox svg {
      opacity: 1;
      transform: scale(1);
    }

    .overlay-root {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scrim {
      position: absolute;
      inset: 0;
      background: rgba(14, 16, 30, 0.14);
      opacity: 0;
      transition: opacity 220ms ease;
    }

    .menu {
      position: absolute;
      top: calc(var(--safe-top) + 74px);
      right: calc(var(--safe-right) + 24px);
      width: min(220px, calc(100% - 48px));
      background: rgba(255, 255, 255, 0.94);
      border-radius: 20px;
      box-shadow: var(--menu-shadow);
      overflow: hidden;
      opacity: 0;
      transform: translateY(-8px) scale(0.96);
      transform-origin: top right;
      transition: opacity 180ms ease, transform 260ms var(--spring);
    }

    .menu-item {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      text-align: left;
      background: transparent;
      font-size: 1rem;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .menu-item + .menu-item {
      border-top: 0.5px solid var(--line);
    }

    .menu-item.danger {
      color: var(--danger);
    }

    .dialog-layer {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.96);
      transition: opacity 220ms ease, transform 300ms var(--spring);
    }

    .dialog {
      width: min(100%, 306px);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(250, 250, 252, 0.97);
      box-shadow: var(--dialog-shadow);
    }

    .dialog-copy {
      padding: 20px 20px 16px;
      text-align: center;
    }

    .dialog-title {
      font-size: 1.05rem;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .dialog-text {
      margin-top: 8px;
      font-size: 0.92rem;
      line-height: 1.34;
      color: rgba(60, 60, 67, 0.86);
      letter-spacing: -0.02em;
    }

    .dialog-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 0.5px solid var(--line);
    }

    .dialog-button {
      min-height: 46px;
      display: grid;
      place-items: center;
      font-size: 1.02rem;
      color: #007aff;
      transition: background-color 180ms ease, transform 180ms ease;
    }

    .dialog-button + .dialog-button {
      border-left: 0.5px solid var(--line);
    }

    .dialog-button.danger {
      color: var(--danger);
      font-weight: 600;
    }

    .overlay-root.is-menu-open,
    .overlay-root.is-dialog-open {
      pointer-events: auto;
    }

    .overlay-root.is-menu-open .scrim,
    .overlay-root.is-dialog-open .scrim {
      opacity: 1;
    }

    .overlay-root.is-menu-open .menu {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .overlay-root.is-dialog-open .dialog-layer {
      pointer-events: auto;
      opacity: 1;
      transform: scale(1);
    }

    @media (max-width: 430px) {
      .page {
        padding: 0;
      }

      .phone-shell {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="phone-shell" aria-label="Silver Pulse mood check">
      <section class="screen">
        <header class="statusbar" aria-label="Status bar">
          <div class="time">9:41</div>
          <div class="status-icons" aria-hidden="true">
            <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
              <rect x="0" y="5" width="4" height="7" rx="1.4" fill="currentColor"></rect>
              <rect x="7" y="3" width="4" height="9" rx="1.4" fill="currentColor"></rect>
              <rect x="14" y="1" width="4" height="11" rx="1.4" fill="currentColor"></rect>
              <rect x="21" y="0" width="4" height="12" rx="1.4" fill="currentColor"></rect>
            </svg>
            <svg width="20" height="14" viewBox="0 0 20 14" fill="none">
              <path d="M2 5.5C4.5 3.2 7.1 2 10 2s5.5 1.2 8 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
              <path d="M5 8.6C6.6 7.1 8.2 6.3 10 6.3s3.4.8 5 2.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
              <circle cx="10" cy="11" r="1.6" fill="currentColor"></circle>
            </svg>
            <svg width="28" height="14" viewBox="0 0 28 14" fill="none">
              <rect x="1" y="1" width="23" height="12" rx="3.5" stroke="currentColor" stroke-width="1.5"></rect>
              <rect x="25" y="4" width="2.5" height="6" rx="1" fill="currentColor" opacity="0.35"></rect>
              <rect x="3.2" y="3.2" width="17" height="7.6" rx="2.2" fill="currentColor"></rect>
            </svg>
          </div>
        </header>

        <section class="hero">
          <div class="hero-copy">
            <h1>How are you feeling today?</h1>
            <p>This will make our chat more helpful for you</p>
          </div>

          <button
            class="profile-trigger"
            id="profileButton"
            type="button"
            aria-label="Open profile menu"
            aria-haspopup="menu"
            aria-controls="profileMenu"
            aria-expanded="false"
          >
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
              <circle cx="14" cy="9" r="4.2" stroke="currentColor" stroke-width="2.2"></circle>
              <path d="M6.8 22.5c1.7-4 5-5.9 7.2-5.9 2.2 0 5.5 1.9 7.2 5.9" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
            </svg>
          </button>
        </section>

        <section class="mood-grid" aria-label="Mood options">
          <button class="mood-card" type="button" aria-pressed="false">
            <div class="mood-art">
              <div class="mood-scene okay"></div>
              <div class="terrain okay"></div>
            </div>
            <div class="card-label">I’m okay</div>
          </button>

          <button class="mood-card" type="button" aria-pressed="false">
            <div class="mood-art">
              <div class="mood-scene lonely"></div>
              <div class="rain-lines"></div>
            </div>
            <div class="card-label">A little lonely</div>
          </button>

          <button class="mood-card" type="button" aria-pressed="false">
            <div class="mood-art">
              <div class="mood-scene worried"></div>
              <div class="storm"></div>
            </div>
            <div class="card-label">A bit worried</div>
          </button>

          <button class="mood-card" type="button" aria-pressed="false">
            <div class="mood-art">
              <div class="mood-scene tired"></div>
              <div class="terrain tired"></div>
            </div>
            <div class="card-label">Tired</div>
          </button>
        </section>

        <footer class="footer">
          <button class="reminder-button" id="reminderButton" type="button" aria-pressed="false">
            <span class="checkbox" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M4 10.5l4 4 8-9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </span>
            <span>Remind me daily to stay active</span>
          </button>
        </footer>
      </section>

      <div class="overlay-root" id="overlayRoot">
        <div class="scrim" id="scrim"></div>

        <div class="menu" id="profileMenu" role="menu" aria-label="Profile actions" aria-hidden="true">
          <button class="menu-item" type="button" role="menuitem">My profile</button>
          <button class="menu-item" type="button" role="menuitem">Notification settings</button>
          <button class="menu-item danger" id="deleteButton" type="button" role="menuitem">Delete account</button>
        </div>

        <div class="dialog-layer" id="dialogLayer" aria-hidden="true">
          <div class="dialog" role="alertdialog" aria-modal="true" aria-labelledby="dialogTitle" aria-describedby="dialogText">
            <div class="dialog-copy">
              <p class="dialog-title" id="dialogTitle">Delete account?</p>
              <p class="dialog-text" id="dialogText">This permanently removes your Silver Pulse account and cannot be undone.</p>
            </div>
            <div class="dialog-actions">
              <button class="dialog-button" id="cancelButton" type="button">Cancel</button>
              <button class="dialog-button danger" id="confirmDeleteButton" type="button">Delete</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    (function () {
      const body = document.body;
      const overlayRoot = document.getElementById('overlayRoot');
      const profileButton = document.getElementById('profileButton');
      const profileMenu = document.getElementById('profileMenu');
      const deleteButton = document.getElementById('deleteButton');
      const dialogLayer = document.getElementById('dialogLayer');
      const cancelButton = document.getElementById('cancelButton');
      const confirmDeleteButton = document.getElementById('confirmDeleteButton');
      const reminderButton = document.getElementById('reminderButton');
      const scrim = document.getElementById('scrim');
      const moodCards = Array.from(document.querySelectorAll('.mood-card'));

      let menuOpen = false;
      let dialogOpen = false;
      let reminderEnabled = false;

      function syncUI() {
        overlayRoot.classList.toggle('is-menu-open', menuOpen);
        overlayRoot.classList.toggle('is-dialog-open', dialogOpen);
        profileButton.setAttribute('aria-expanded', String(menuOpen));
        profileMenu.setAttribute('aria-hidden', String(!menuOpen));
        dialogLayer.setAttribute('aria-hidden', String(!dialogOpen));
        body.classList.toggle('overlay-open', menuOpen || dialogOpen);
        reminderButton.classList.toggle('is-checked', reminderEnabled);
        reminderButton.setAttribute('aria-pressed', String(reminderEnabled));
      }

      function closeAll() {
        menuOpen = false;
        dialogOpen = false;
        syncUI();
      }

      profileButton.addEventListener('click', function (event) {
        event.stopPropagation();
        menuOpen = !menuOpen;
        dialogOpen = false;
        syncUI();
      });

      deleteButton.addEventListener('click', function (event) {
        event.stopPropagation();
        menuOpen = true;
        dialogOpen = true;
        syncUI();
      });

      cancelButton.addEventListener('click', function () {
        closeAll();
      });

      confirmDeleteButton.addEventListener('click', function () {
        closeAll();
      });

      scrim.addEventListener('click', function () {
        closeAll();
      });

      reminderButton.addEventListener('click', function () {
        reminderEnabled = !reminderEnabled;
        syncUI();
      });

      moodCards.forEach(function (card) {
        card.addEventListener('click', function () {
          moodCards.forEach(function (item) {
            item.classList.remove('is-selected');
            item.setAttribute('aria-pressed', 'false');
          });
          card.classList.add('is-selected');
          card.setAttribute('aria-pressed', 'true');
        });
      });

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape' && (menuOpen || dialogOpen)) {
          event.preventDefault();
          closeAll();
        }
      });

      document.addEventListener('click', function (event) {
        if (!overlayRoot.contains(event.target) && !profileButton.contains(event.target)) {
          closeAll();
        }
      });

      syncUI();
    }());
  </script>
</body>
</html>
