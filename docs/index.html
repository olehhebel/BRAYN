<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRAYN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f2f2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 360px;
      width: 90%;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      color: #1c1c1e;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: #6c6c70;
      line-height: 1.5;
    }
    .links {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .link-btn {
      display: block;
      padding: 14px 20px;
      background: #007aff;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .link-btn:hover { opacity: 0.85; }
  </style>
</head>

  <div class="card">
    <h1>BRAYN</h1>
    <p>Прототипи, опубліковані через GitHub Pages.</p>
