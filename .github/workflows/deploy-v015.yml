name: Deploy BRAYN v0.15 Prototype

on:
  push:
    branches:
      - main
      - copilot/create-mobile-first-prototype-v015
    paths:
      - 'v0.15/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./v0.15
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
