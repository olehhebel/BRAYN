name: Deploy v0.15 to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'v0.15/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload v0.15 as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './v0.15'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
