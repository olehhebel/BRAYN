<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Ray Pixel — Interactive Poses</title>
<style>
  :root {
    --cols: 60;
    --rows: 96;
    --bg: #000000;
    --ui-pink: #FF1296;
    --ui-cyan: #00FFFF;
    --ui-lime: #D5F20E;
    --ui-blue: #0E15AB;
    --ui-deep: #121226;
    --ui-panel: rgba(18,18,38,.72);
    --ui-stroke: rgba(255,255,255,.10);
    --btn-shadow: 0 10px 30px rgba(0,0,0,.45);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    color: #fff;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    overflow: hidden;
  }
  body {
    background: #000;
  }
  .app {
    min-height: 100svh;
    display: grid;
    grid-template-rows: 1fr auto;
    padding: clamp(12px, 2vw, 24px);
    gap: clamp(12px, 2vh, 20px);
  }
  .stage {
    position: relative;
    display: grid;
    place-items: center;
    min-height: 0;
  }
  .stage::before {
    display: none;
  }
  .sprite-shell {
    position: relative;
    width: min(86vw, calc(79svh * 0.625));
    aspect-ratio: 60 / 96;
    display: grid;
    place-items: center;
    will-change: transform;
    transform-origin: 50% 82%;
  }
  canvas {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    display: block;
    filter: none;
  }
  .shadow {
    position: absolute;
    left: 50%;
    bottom: 6.7%;
    width: 34%;
    height: 5.2%;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at center, rgba(0,0,0,.92) 0%, rgba(0,0,0,.55) 58%, rgba(0,0,0,0) 100%);
    pointer-events: none;
    will-change: transform, opacity, width;
  }
  .controls {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: center;
    gap: clamp(10px, 2vw, 18px);
    flex-wrap: wrap;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
  }
  .btn {
    appearance: none;
    border: 1px solid var(--ui-stroke);
    border-radius: 999px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)),
      rgba(18,18,38,.72);
    color: #fff;
    padding: clamp(12px, 1vw + 8px, 15px) clamp(20px, 2vw + 10px, 28px);
    min-width: clamp(104px, 16vw, 140px);
    font-size: clamp(14px, 1vw + 10px, 16px);
    line-height: 1;
    font-weight: 800;
    letter-spacing: .12em;
    text-transform: uppercase;
    box-shadow: var(--btn-shadow);
    cursor: pointer;
    transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .btn:hover {
    transform: translateY(-2px);
    border-color: rgba(255,255,255,.22);
  }
  .btn:active {
    transform: translateY(1px) scale(.985);
  }
  .btn.is-active {
    border-color: rgba(213,242,14,.42);
    box-shadow: 0 12px 34px rgba(0,0,0,.52), 0 0 0 1px rgba(213,242,14,.08) inset;
    background:
      linear-gradient(180deg, rgba(213,242,14,.18), rgba(255,18,150,.08)),
      rgba(18,18,38,.88);
  }
  .hud {
    position: absolute;
    inset: auto auto 100% 50%;
    transform: translate(-50%, -18px);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(255,255,255,.72);
    background: rgba(10,10,18,.55);
    border: 1px solid rgba(255,255,255,.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
  }
  @media (max-width: 720px) {
    .sprite-shell {
      width: min(92vw, calc(72svh * 0.625));
    }
    .hud {
      font-size: 11px;
      transform: translate(-50%, -10px);
    }
  }
</style>
</head>
<body>
  <div class="app">
    <section class="stage">
      <div class="sprite-shell" id="shell">
        <div class="hud">Ray Pixel</div>
        <div class="shadow" id="shadow"></div>
        <canvas id="canvas" width="60" height="96" aria-label="Interactive pixel-art Ray character"></canvas>
      </div>
    </section>
    <nav class="controls" aria-label="Ray pose controls">
      <button class="btn" data-action="smile">Smile</button>
      <button class="btn" data-action="hands">Hands</button>
      <button class="btn" data-action="jump">Jump</button>
    </nav>
  </div>

  ];

  paint(leftEye, cyanMain);
  paint(rightEye, cyanMain);
  paint([[27,31],[36,31]], cyanAlt);
})();

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
ctx.imageSmoothingEnabled = false;
const shell = document.getElementById('shell');
const shadowEl = document.getElementById('shadow');
const buttons = [...document.querySelectorAll('.btn')];

const COLS = 60;
const ROWS = 96;
const BAYER4 = [
  [0/16, 8/16, 2/16,10/16],
  [12/16,4/16,14/16,6/16],
  [3/16,11/16,1/16,9/16],
  [15/16,7/16,13/16,5/16]
];

const state = {
  time: 0,
  action: null,
  startedAt: 0,
  totalDuration: 0,
  particles: [],
  lastFrame: performance.now(),
};

function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function mix(a, b, t) { return a + (b - a) * t; }
function easeInOutCubic(t) { return t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}
function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }
function easeInQuad(t) { return t * t; }
function fract(v) { return v - Math.floor(v); }
function hash2(x, y) {
  return fract(Math.sin(x * 12.9898 + y * 78.233) * 43758.5453123);
}
function thresholdFor(action, x, y) {
  const bayer = BAYER4[y & 3][x & 3];
  if (action === 'smile') {
    const dx = (x - 30) / 16;
    const dy = (y - 32) / 10;
    const face = Math.sqrt(dx * dx + dy * dy);
    return clamp(face * .36 + bayer * .44 + hash2(x, y) * .12, 0, 1);
  }
  if (action === 'hands') {
    return clamp((1 - y / ROWS) * .58 + bayer * .28 + hash2(x, y) * .14, 0, 1);
  }
  if (action === 'jump') {
    return clamp((y / ROWS) * .52 + bayer * .34 + hash2(x + 13, y + 7) * .14, 0, 1);
  }
  return clamp(bayer * .72 + hash2(x, y) * .28, 0, 1);
}

function pickIndex(fromPose, toPose, t, x, y, action) {
  const a = fromPose.rows[y][x];
  const b = toPose.rows[y][x];
  if (a === b) return a;
  const th = thresholdFor(action, x, y);
  return t >= th ? b : a;
}

function renderMorph(fromKey, toKey, t, action) {
  const fromPose = POSES[fromKey];
  const toPose = POSES[toKey];
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, COLS, ROWS);

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const idx = pickIndex(fromPose, toPose, t, x, y, action);
      if (idx === 0) continue;
      const palette = t >= thresholdFor(action, x, y) ? toPose.palette : fromPose.palette;
      ctx.fillStyle = palette[idx];
      ctx.fillRect(x, y, 1, 1);
    }
  }
}

function renderPose(key) {
  const pose = POSES[key];
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, COLS, ROWS);
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const idx = pose.rows[y][x];
      if (idx === 0) continue;
      ctx.fillStyle = pose.palette[idx];
      ctx.fillRect(x, y, 1, 1);
    }
  }
}

function addParticle(x, y, color, vx, vy, life, size = 1) {
  state.particles.push({ x, y, color, vx, vy, life, age: 0, size });
}

function burstSmile() {
  const colors = ['#27c9c9', '#249b9f', '#449fae'];
  for (let i = 0; i < 9; i++) {
    const a = (Math.PI * 2 * i) / 9;
    addParticle(30 + Math.cos(a) * 8, 33 + Math.sin(a) * 5, colors[i % colors.length], Math.cos(a) * .18, Math.sin(a) * .14 - .04, 420 + i * 18, 1);
  }
}

function burstHands() {
  const colors = ['#d848a2', '#c41879', '#27c9c9'];
  for (let i = 0; i < 12; i++) {
    const side = i % 2 === 0 ? -1 : 1;
    addParticle(30 + side * (10 + (i % 3)), 18 + (i % 4), colors[i % colors.length], side * (.12 + (i % 3) * .03), -.16 - (i % 2) * .02, 360 + i * 14, 1);
  }
}

function burstJump() {
  const colors = ['#d848a2', '#c41879', '#9e1c6b', '#27c9c9'];
  for (let i = 0; i < 16; i++) {
    const side = i % 2 === 0 ? -1 : 1;
    addParticle(30 + side * (5 + (i % 5)), 86 - (i % 2), colors[i % colors.length], side * (.12 + (i % 4) * .04), -.18 - Math.random() * .08, 520 + i * 10, 1);
  }
}

function updateParticles(dt) {
  const next = [];
  for (const p of state.particles) {
    p.age += dt;
    if (p.age >= p.life) continue;
    p.x += p.vx * dt * .06;
    p.y += p.vy * dt * .06;
    p.vy += 0.0022 * dt;
    next.push(p);
  }
  state.particles = next;
}

function drawParticles() {
  for (const p of state.particles) {
    const a = 1 - p.age / p.life;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function idleTransform() {
  return {
    y: 0,
    x: 0,
    scaleX: 1,
    scaleY: 1,
    rotate: 0,
    shadowScaleX: 1,
    shadowScaleY: 1,
    shadowOpacity: 0.84
  };
}

function setTransform(tr) {
  shell.style.transform =
    `translate3d(${tr.x.toFixed(2)}px, ${tr.y.toFixed(2)}px, 0) rotate(${tr.rotate.toFixed(2)}deg) scale(${tr.scaleX.toFixed(4)}, ${tr.scaleY.toFixed(4)})`;
  shadowEl.style.transform = `translateX(-50%) scale(${tr.shadowScaleX.toFixed(3)}, ${tr.shadowScaleY.toFixed(3)})`;
  shadowEl.style.opacity = tr.shadowOpacity.toFixed(3);
}

function setActiveButton(action) {
  buttons.forEach(btn => btn.classList.toggle('is-active', btn.dataset.action === action));
}


function haptic(action) {
  const isCoarse = typeof window.matchMedia === 'function' ? window.matchMedia('(pointer: coarse)').matches : false;
  if (!isCoarse || typeof navigator === 'undefined' || typeof navigator.vibrate !== 'function') return;
  const patterns = {
    smile: [12],
    hands: [16, 22, 16],
    jump: [22, 28, 18]
  };
  navigator.vibrate(patterns[action] || [10]);
}

function trigger(action) {
  state.action = action;
  state.startedAt = state.time;
  state.totalDuration = action === 'jump' ? 1020 : action === 'hands' ? 920 : 760;
  setActiveButton(action);
  haptic(action);
  if (action === 'smile') burstSmile();
  if (action === 'hands') burstHands();
  if (action === 'jump') burstJump();
}

function renderAction(now) {
  const elapsed = now - state.startedAt;
  const a = state.action;

  if (!a) {
    renderPose('idle');
    setTransform(idleTransform(now));
    return;
  }

  if (a === 'smile') {
    const anticipation = clamp(elapsed / 110, 0, 1);
    const up = clamp((elapsed - 110) / 220, 0, 1);
    const hold = clamp((elapsed - 330) / 110, 0, 1);
    const back = clamp((elapsed - 440) / 320, 0, 1);

    let tr = { x: 0, y: 0, scaleX: 1, scaleY: 1, rotate: 0, shadowScaleX: 1, shadowScaleY: 1, shadowOpacity: .82 };
    let poseProgress = 0;
    let from = 'idle', to = 'smile';

    if (elapsed < 110) {
      const t = easeOutQuad(anticipation);
      tr.y = mix(0, 2.2, t);
      tr.scaleX = mix(1, 1.016, t);
      tr.scaleY = mix(1, .975, t);
      tr.shadowScaleX = mix(1, 1.08, t);
    } else if (elapsed < 330) {
      const t = easeOutBack(up);
      poseProgress = clamp(t, 0, 1);
      tr.y = mix(2.2, -2.6, poseProgress);
      tr.scaleX = mix(1.016, .992, poseProgress);
      tr.scaleY = mix(.975, 1.03, poseProgress);
      tr.rotate = mix(0, -1.2, poseProgress);
    } else if (elapsed < 440) {
      poseProgress = 1;
      tr.y = -2.3 + Math.sin(hold * Math.PI) * -.6;
      tr.rotate = -1 + Math.sin(hold * Math.PI * 2) * .4;
      tr.scaleY = 1.02;
    } else {
      const t = easeInOutCubic(back);
      from = 'smile';
      to = 'idle';
      poseProgress = t;
      tr.y = mix(-2.2, 0, t);
      tr.rotate = mix(-1, 0, t);
      tr.scaleX = mix(.992, 1, t);
      tr.scaleY = mix(1.03, 1, t);
      tr.shadowScaleX = mix(1.02, 1, t);
    }

    renderMorph(from, to, poseProgress, a);
    drawParticles();
    setTransform(tr);
  }

  if (a === 'hands') {
    const anticipation = clamp(elapsed / 100, 0, 1);
    const rise = clamp((elapsed - 100) / 260, 0, 1);
    const hold = clamp((elapsed - 360) / 180, 0, 1);
    const back = clamp((elapsed - 540) / 380, 0, 1);

    let tr = { x: 0, y: 0, scaleX: 1, scaleY: 1, rotate: 0, shadowScaleX: 1, shadowScaleY: 1, shadowOpacity: .8 };
    let poseProgress = 0;
    let from = 'idle', to = 'hands';

    if (elapsed < 100) {
      const t = easeOutQuad(anticipation);
      tr.y = mix(0, 1.8, t);
      tr.scaleX = mix(1, 1.03, t);
      tr.scaleY = mix(1, .968, t);
      tr.shadowScaleX = mix(1, 1.08, t);
    } else if (elapsed < 360) {
      const t = easeOutBack(rise);
      poseProgress = clamp(t, 0, 1);
      tr.y = mix(1.8, -3.8, poseProgress);
      tr.scaleX = mix(1.03, .99, poseProgress);
      tr.scaleY = mix(.968, 1.038, poseProgress);
      tr.rotate = mix(0, .7, poseProgress);
    } else if (elapsed < 540) {
      poseProgress = 1;
      tr.y = -3.6 + Math.sin(hold * Math.PI * 2) * -.4;
      tr.rotate = .5 + Math.sin(hold * Math.PI * 2) * .7;
      tr.scaleY = 1.025;
      tr.shadowScaleX = .98;
      tr.shadowOpacity = .72;
    } else {
      const t = easeInOutCubic(back);
      from = 'hands';
      to = 'idle';
      poseProgress = t;
      tr.y = mix(-3.6, 0, t) + Math.sin(t * Math.PI) * 1.1;
      tr.rotate = mix(.5, 0, t);
      tr.scaleX = mix(.99, 1, t);
      tr.scaleY = mix(1.03, 1, t);
      tr.shadowScaleX = mix(.98, 1, t);
    }

    renderMorph(from, to, poseProgress, a);
    drawParticles();
    setTransform(tr);
  }

  if (a === 'jump') {
    const crouch = clamp(elapsed / 120, 0, 1);
    const launch = clamp((elapsed - 120) / 220, 0, 1);
    const air = clamp((elapsed - 340) / 180, 0, 1);
    const land = clamp((elapsed - 520) / 500, 0, 1);

    let tr = { x: 0, y: 0, scaleX: 1, scaleY: 1, rotate: 0, shadowScaleX: 1, shadowScaleY: 1, shadowOpacity: .84 };
    let poseProgress = 0;
    let from = 'idle', to = 'jump';

    if (elapsed < 120) {
      const t = easeInOutCubic(crouch);
      tr.y = mix(0, 3.2, t);
      tr.scaleX = mix(1, 1.05, t);
      tr.scaleY = mix(1, .92, t);
      tr.shadowScaleX = mix(1, 1.16, t);
      tr.shadowOpacity = .9;
      poseProgress = 0;
    } else if (elapsed < 340) {
      const t = easeOutBack(launch);
      poseProgress = clamp(launch * 1.12, 0, 1);
      tr.y = mix(3.2, -22, clamp(t,0,1));
      tr.x = mix(0, 1.6, clamp(t,0,1));
      tr.rotate = mix(0, -5.2, clamp(t,0,1));
      tr.scaleX = mix(1.05, .985, clamp(t,0,1));
      tr.scaleY = mix(.92, 1.035, clamp(t,0,1));
      tr.shadowScaleX = mix(1.16, .72, clamp(t,0,1));
      tr.shadowScaleY = mix(1, .72, clamp(t,0,1));
      tr.shadowOpacity = mix(.9, .42, clamp(t,0,1));
    } else if (elapsed < 520) {
      poseProgress = 1;
      tr.y = -22 + Math.sin(air * Math.PI) * 1.8;
      tr.x = 1.6;
      tr.rotate = -5.2 + Math.sin(air * Math.PI * 2) * .8;
      tr.scaleX = .985;
      tr.scaleY = 1.03;
      tr.shadowScaleX = .7;
      tr.shadowScaleY = .68;
      tr.shadowOpacity = .36;
    } else {
      const t = easeInOutCubic(land);
      from = 'jump';
      to = 'idle';
      poseProgress = t;
      tr.y = mix(-22, 0, t) + Math.sin(t * Math.PI) * 4.2;
      tr.x = mix(1.6, 0, t);
      tr.rotate = mix(-5.2, 0, t);
      tr.scaleX = mix(.985, 1 + Math.sin(t * Math.PI) * .02, t);
      tr.scaleY = t < .68 ? mix(1.03, .94, t / .68) : mix(.94, 1, (t - .68) / .32);
      tr.shadowScaleX = mix(.7, 1.16, Math.min(t / .62, 1));
      tr.shadowScaleY = mix(.68, 1, Math.min(t / .62, 1));
      tr.shadowOpacity = mix(.36, .9, Math.min(t / .62, 1));
    }

    renderMorph(from, to, poseProgress, a);
    drawParticles();
    setTransform(tr);
  }

  if (elapsed >= state.totalDuration) {
    state.action = null;
    setActiveButton(null);
  }
}

function loop(now) {
  const dt = Math.min(34, now - state.lastFrame || 16);
  state.lastFrame = now;
  state.time = now;
  updateParticles(dt);
  renderAction(now);
  requestAnimationFrame(loop);
}

buttons.forEach(btn => {
  btn.addEventListener('click', () => trigger(btn.dataset.action));
});

window.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === '1' || key === 's') trigger('smile');
  if (key === '2' || key === 'h') trigger('hands');
  if (key === '3' || key === 'j' || key === ' ') {
    e.preventDefault();
    trigger('jump');
  }
}, { passive: false });

renderPose('idle');
setTransform(idleTransform(0));
requestAnimationFrame(loop);
</script>
</body>
</html>
